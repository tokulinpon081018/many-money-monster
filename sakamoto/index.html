<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サカモト</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  background: linear-gradient(135deg, #fff7d6, #e6fff8);
  color: #222;
}

#wrap {
  width: 100vw;
  height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#gameBox {
  position: relative;
  width: min(94vw, 430px);
  height: min(88svh, 720px);
  background: #fffaf0;
  border: 4px solid #222;
  border-radius: 24px;
  box-shadow: 6px 6px 0 #222;
  overflow: hidden;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.screen {
  position: absolute;
  inset: 0;
  z-index: 10;
  background: rgba(255, 250, 240, 0.97);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 18px;
}

.hidden {
  display: none !important;
}

h1 {
  margin: 0 0 4px;
  font-size: 34px;
  letter-spacing: 3px;
}

h2 {
  margin: 0 0 8px;
  font-size: 24px;
}

p {
  font-size: 16px;
  line-height: 1.55;
  font-weight: 800;
  margin: 8px 0;
}

button {
  margin-top: 10px;
  padding: 13px 28px;
  border: 3px solid #222;
  border-radius: 18px;
  background: linear-gradient(135deg, #ff4f9a, #ff9d3b);
  color: white;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 4px 4px 0 #222;
}

button:active {
  transform: translate(4px, 4px);
  box-shadow: none;
}

.modeButtons {
  display: flex;
  gap: 14px;
  justify-content: center;
  align-items: center;
  margin-top: 8px;
}

.modeButtons button:nth-child(2) {
  background: linear-gradient(135deg, #1e9bff, #19c37d);
}

#sampleTitle {
  margin-top: 4px;
  font-size: 15px;
  font-weight: 900;
  color: #ff4f9a;
}

#sampleImage {
  width: 150px;
  height: 150px;
  object-fit: contain;
  background: white;
  border: 3px solid #222;
  border-radius: 18px;
  box-shadow: 3px 3px 0 #222;
  margin: 6px 0 8px;
}

#topInfo {
  position: absolute;
  top: 10px;
  left: 12px;
  right: 12px;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 900;
  font-size: 15px;
  pointer-events: none;
}

#message {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 14px;
  z-index: 5;
  text-align: center;
  font-size: 20px;
  font-weight: 900;
  color: #ff4f9a;
  pointer-events: none;
}

#resultScreen {
  top: auto;
  bottom: 0;
  height: 235px;
  background: rgba(255, 250, 240, 0.90);
  border-top: 4px solid #222;
  justify-content: center;
  padding: 10px 14px;
}

#resultScreen h1 {
  font-size: 28px;
  margin: 0;
}

#resultScore {
  font-size: 42px;
  font-weight: 900;
  margin: 2px 0;
  color: #ff4f9a;
}

#resultRank {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 2px;
}

#resultDetail {
  font-size: 14px;
  line-height: 1.35;
  margin: 2px 0;
}

#resultScreen button {
  margin-top: 6px;
  padding: 8px 18px;
  font-size: 16px;
}

.small {
  font-size: 13px;
  color: #555;
}
</style>
</head>

<body>
<div id="wrap">
  <div id="gameBox">
    <canvas id="game"></canvas>

    <div id="topInfo">
      <div id="partInfo">PART 0 / 7</div>
      <div id="scoreInfo">サカモト度 0%</div>
    </div>

    <div id="message">準備中...</div>

    <div id="startScreen" class="screen">
      <h1>サカモト</h1>
      <h2>顔面ピンボール</h2>

      <div id="sampleTitle">完成見本：これがサカモトだ！</div>
      <img id="sampleImage" src="img/gattai.PNG?v=5" alt="完成見本">

      <p>
        顔パーツが壁に当たって跳ねる！<br>
        見本を覚えて、ここだと思ったらタップ！
      </p>

      <div class="modeButtons">
        <button onclick="startGame('easy')">初級</button>
        <button onclick="startGame('hard')">上級</button>
      </div>

      <p class="small">
        初級：向きそのまま<br>
        上級：くるくる回転
      </p>
    </div>

    <div id="resultScreen" class="screen hidden">
      <h1>完成！</h1>
      <div id="resultScore">0%</div>
      <div id="resultRank">サカモトの気配</div>
      <p id="resultDetail"></p>
      <button onclick="backToStart()">もう一回</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const startScreen = document.getElementById("startScreen");
const resultScreen = document.getElementById("resultScreen");
const message = document.getElementById("message");
const partInfo = document.getElementById("partInfo");
const scoreInfo = document.getElementById("scoreInfo");
const resultScore = document.getElementById("resultScore");
const resultRank = document.getElementById("resultRank");
const resultDetail = document.getElementById("resultDetail");

let W = 0;
let H = 0;
let dpr = 1;
let images = {};
let crops = {};
let parts = [];
let currentIndex = 0;
let running = false;
let finished = false;
let audioCtx = null;
let gameMode = "easy";

const imageFiles = {
  face: "img/face.PNG",
  eyeL: "img/eyeL.PNG",
  eyeR: "img/eyeR.PNG",
  nose: "img/nose.PNG",
  mouth: "img/mouth.PNG",
  earL: "img/earL.PNG",
  earR: "img/earR.PNG",
  hair: "img/hair.PNG"
};

function resizeCanvas() {
  const rect = document.getElementById("gameBox").getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;

  W = rect.width;
  H = rect.height;

  canvas.width = W * dpr;
  canvas.height = H * dpr;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  setupParts();
}

window.addEventListener("resize", resizeCanvas);

function loadImages() {
  const keys = Object.keys(imageFiles);
  let loaded = 0;

  keys.forEach(key => {
    const img = new Image();
    img.src = imageFiles[key] + "?v=5";

    img.onload = () => {
      images[key] = img;
      loaded++;
      message.textContent = `画像読み込み中 ${loaded} / ${keys.length}`;

      if (loaded === keys.length) {
        makeAllCrops();
        resizeCanvas();
        message.textContent = "初級か上級を選んでね";
        draw();
      }
    };

    img.onerror = () => {
      message.textContent = `${imageFiles[key]} が読めません`;
    };
  });
}

function makeAllCrops() {
  Object.keys(images).forEach(key => {
    crops[key] = findInkBounds(images[key]);
  });
}

function findInkBounds(img) {
  const temp = document.createElement("canvas");
  const tctx = temp.getContext("2d");

  temp.width = img.width;
  temp.height = img.height;

  tctx.drawImage(img, 0, 0);

  const data = tctx.getImageData(0, 0, temp.width, temp.height).data;

  let minX = temp.width;
  let minY = temp.height;
  let maxX = 0;
  let maxY = 0;
  let found = false;

  for (let y = 0; y < temp.height; y += 2) {
    for (let x = 0; x < temp.width; x += 2) {
      const i = (y * temp.width + x) * 4;
      const r = data[i];
      const g = data[i + 1];
      const b = data[i + 2];
      const a = data[i + 3];

      if (a > 20 && r < 130 && g < 130 && b < 130) {
        found = true;
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (!found) {
    return {
      sx: 0,
      sy: 0,
      sw: img.width,
      sh: img.height
    };
  }

  const pad = 18;

  minX = Math.max(0, minX - pad);
  minY = Math.max(0, minY - pad);
  maxX = Math.min(img.width, maxX + pad);
  maxY = Math.min(img.height, maxY + pad);

  return {
    sx: minX,
    sy: minY,
    sw: maxX - minX,
    sh: maxY - minY
  };
}

function setupParts() {
  if (!W || !H) return;

  const cx = W / 2;
  const cy = H / 2 + 20;

  parts = [
    {
      key: "eyeL",
      name: "左目",
      targetX: cx - 62,
      targetY: cy - 62,
      targetAngle: 0,
      size: 105
    },
    {
      key: "eyeR",
      name: "右目",
      targetX: cx + 62,
      targetY: cy - 62,
      targetAngle: 0,
      size: 105
    },
    {
      key: "nose",
      name: "鼻",
      targetX: cx,
      targetY: cy + 6,
      targetAngle: 0,
      size: 150
    },
    {
      key: "mouth",
      name: "口",
      targetX: cx,
      targetY: cy + 98,
      targetAngle: 0,
      size: 130
    },
    {
      key: "earL",
      name: "左耳",
      targetX: cx - 145,
      targetY: cy - 20,
      targetAngle: 0,
      size: 70
    },
    {
      key: "earR",
      name: "右耳",
      targetX: cx + 145,
      targetY: cy - 20,
      targetAngle: 0,
      size: 70
    },
    {
      key: "hair",
      name: "髪",
      targetX: cx,
      targetY: cy - 150,
      targetAngle: 0,
      size: 400
    }
  ];

  parts.forEach((p, i) => {
    resetPart(p, i);
    p.stopped = false;
    p.score = 0;
    p.positionScore = 0;
    p.angleScore = 0;
  });
}

function resetPart(p, i) {
  const margin = 70;

  p.x = margin + Math.random() * Math.max(1, W - margin * 2);
  p.y = margin + Math.random() * Math.max(1, H - margin * 2);

  const speed = 3.0 + Math.random() * 2.0 + i * 0.18;
  const dir = Math.random() * Math.PI * 2;

  p.vx = Math.cos(dir) * speed;
  p.vy = Math.sin(dir) * speed;

  if (gameMode === "hard") {
    p.angle = Math.random() * Math.PI * 2;
  } else {
    p.angle = 0;
  }

  p.spin = (0.045 + Math.random() * 0.095) * (Math.random() < 0.5 ? -1 : 1);
}

function startGame(mode) {
  gameMode = mode;

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {
    audioCtx = null;
  }

  resizeCanvas();

  currentIndex = 0;
  running = true;
  finished = false;

  parts.forEach((p, i) => {
    resetPart(p, i);
    p.stopped = false;
    p.score = 0;
    p.positionScore = 0;
    p.angleScore = 0;
  });

  startScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");

  if (gameMode === "easy") {
    message.textContent = `${parts[currentIndex].name}を止めろ！`;
  } else {
    message.textContent = `${parts[currentIndex].name}を止めろ！`;
  }

  updateInfo();
  soundStart();
}

function stopCurrentPart() {
  if (!running || finished) return;

  const p = parts[currentIndex];
  if (!p) return;

  p.stopped = true;
  calculateScore(p);
  soundTap();

  currentIndex++;

  if (currentIndex >= parts.length) {
    finishGame();
  } else {
    message.textContent = `${parts[currentIndex].name}を止めろ！`;
    updateInfo();
  }
}

function calculateScore(p) {
  const dx = p.x - p.targetX;
  const dy = p.y - p.targetY;
  const distance = Math.sqrt(dx * dx + dy * dy);

  const maxDistance = 185;
  const positionScore = Math.max(0, 100 - distance / maxDistance * 100);

  let angleScore = 100;

  if (gameMode === "hard") {
    const angleDiff = Math.abs(normalizeAngle(p.angle - p.targetAngle));
    angleScore = Math.max(0, 100 - angleDiff / Math.PI * 100);
    p.score = positionScore * 0.75 + angleScore * 0.25;
  } else {
    p.score = positionScore;
  }

  p.positionScore = positionScore;
  p.angleScore = angleScore;
}

function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

function finishGame() {
  running = false;
  finished = true;

  let total = 0;
  let posTotal = 0;
  let angleTotal = 0;

  parts.forEach(p => {
    total += p.score;
    posTotal += p.positionScore;
    angleTotal += p.angleScore;
  });

  const final = Math.round(total / parts.length);
  const posAvg = Math.round(posTotal / parts.length);
  const angleAvg = Math.round(angleTotal / parts.length);

  resultScore.textContent = `${final}%`;
  resultRank.textContent = getRank(final);

  if (gameMode === "easy") {
    resultDetail.innerHTML = `
      モード：初級<br>
      位置スコア：${posAvg}点<br>
      サカモト度：${final}%
    `;
  } else {
    resultDetail.innerHTML = `
      モード：上級<br>
      位置スコア：${posAvg}点<br>
      角度スコア：${angleAvg}点<br>
      サカモト度：${final}%
    `;
  }

  message.textContent = "サカモト完成！";
  updateInfo();

  resultScreen.classList.remove("hidden");
  soundFinish(final);
}

function getRank(score) {
  if (score >= 98) return "完全体サカモト";
  if (score >= 90) return "ほぼサカモト";
  if (score >= 75) return "かなりサカモト";
  if (score >= 60) return "サカモトっぽい";
  if (score >= 40) return "サカモトの気配";
  if (score >= 20) return "サカモト、行方不明";
  return "誰だお前";
}

function backToStart() {
  running = false;
  finished = false;
  resultScreen.classList.add("hidden");
  startScreen.classList.remove("hidden");
  message.textContent = "初級か上級を選んでね";
  draw();
}

function update() {
  if (running && !finished) {
    const p = parts[currentIndex];

    if (p && !p.stopped) {
      p.x += p.vx;
      p.y += p.vy;

      if (gameMode === "hard") {
        p.angle += p.spin;
      } else {
        p.angle = 0;
      }

      const r = p.size / 2;

      if (p.x < r) {
        p.x = r;
        p.vx *= -1;
        wallSound();
      }

      if (p.x > W - r) {
        p.x = W - r;
        p.vx *= -1;
        wallSound();
      }

      if (p.y < r) {
        p.y = r;
        p.vy *= -1;
        wallSound();
      }

      if (p.y > H - r) {
        p.y = H - r;
        p.vy *= -1;
        wallSound();
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  drawPaper();
  drawFace();

  if (running && !finished) {
    drawGuide();
  }

  parts.forEach(p => {
    if (p.stopped) {
      drawPart(p);
    }
  });

  if (running && parts[currentIndex]) {
    drawPart(parts[currentIndex]);
  }

  drawTitle();
}

function drawPaper() {
  ctx.save();
  ctx.fillStyle = "#fffaf0";
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = "rgba(0,0,0,0.07)";
  ctx.lineWidth = 1;

  for (let y = 40; y < H; y += 34) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y + Math.sin(y * 0.08) * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawTitle() {
  ctx.save();
  ctx.fillStyle = "#222";
  ctx.font = "900 18px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("サカモト", W / 2, 34);
  ctx.restore();
}

function drawFace() {
  if (!images.face) return;

  const cx = W / 2;
  const cy = H / 2 + 20;

  drawCroppedImageCenter("face", cx, cy, 300, 0, 0.95);
}

function drawGuide() {
  ctx.save();
  ctx.globalAlpha = 0.13;
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 2;

  parts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.targetX, p.targetY, p.size / 2, 0, Math.PI * 2);
    ctx.stroke();
  });

  ctx.restore();
}

function drawPart(p) {
  drawCroppedImageCenter(p.key, p.x, p.y, p.size, p.angle, 1);
}

function drawCroppedImageCenter(key, x, y, size, angle, alpha) {
  const img = images[key];
  const crop = crops[key];

  if (!img || !crop) return;

  const ratio = crop.sh / crop.sw;
  const w = size;
  const h = size * ratio;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.drawImage(
    img,
    crop.sx,
    crop.sy,
    crop.sw,
    crop.sh,
    -w / 2,
    -h / 2,
    w,
    h
  );

  ctx.restore();
}

function updateInfo() {
  partInfo.textContent = `PART ${Math.min(currentIndex + 1, parts.length)} / ${parts.length}`;

  const stopped = parts.filter(p => p.stopped);
  if (stopped.length === 0) {
    scoreInfo.textContent = "サカモト度 0%";
    return;
  }

  const avg = Math.round(stopped.reduce((sum, p) => sum + p.score, 0) / stopped.length);
  scoreInfo.textContent = `サカモト度 ${avg}%`;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener("pointerdown", stopCurrentPart);

function tone(freq, duration, type = "sine", vol = 0.06) {
  if (!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function soundStart() {
  tone(440, 0.08, "square", 0.05);
  setTimeout(() => tone(660, 0.08, "square", 0.05), 90);
  setTimeout(() => tone(880, 0.12, "square", 0.05), 180);
}

function soundTap() {
  tone(720, 0.06, "triangle", 0.05);
}

function wallSound() {
  if (Math.random() < 0.22) {
    tone(160 + Math.random() * 120, 0.03, "square", 0.025);
  }
}

function soundFinish(score) {
  if (score >= 75) {
    tone(523, 0.1, "square", 0.06);
    setTimeout(() => tone(659, 0.1, "square", 0.06), 120);
    setTimeout(() => tone(784, 0.14, "square", 0.06), 240);
    setTimeout(() => tone(1046, 0.2, "square", 0.06), 390);
  } else {
    tone(220, 0.14, "sawtooth", 0.05);
    setTimeout(() => tone(180, 0.18, "sawtooth", 0.05), 150);
  }
}

loadImages();
resizeCanvas();
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾バッティング</title>
    <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #dff3ff;
      text-align: center;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      padding: 8px;
    }

    #field {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      overflow: hidden;
      border: 4px solid #222;
      border-radius: 18px;
      background: linear-gradient(
        #bdefff 0%,
        #bdefff 56%,
        #8fd36b 57%,
        #62b94f 100%
      );
    }

    #titleArea {
      position: absolute;
      top: 8px;
      left: 0;
      width: 100%;
      z-index: 50;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #222;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    h2 {
      margin: 2px 0 0;
      font-size: 18px;
      color: #d12b2b;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    #message {
      position: absolute;
      top: 72px;
      left: 0;
      width: 100%;
      z-index: 50;
      font-size: 23px;
      font-weight: bold;
      color: #222;
      text-shadow: 2px 2px 0 #fff;
      pointer-events: none;
    }

    #body {
      position: absolute;
      width: 200px;
      left: 50%;
      bottom: -20px;
      transform: translateX(-50%);
      z-index: 5;
    }

    #head {
      position: absolute;
      width: 70px;
      max-width: 70px;
      height: auto;
      left: 50%;
      top: -100px;
      transform: translateX(-50%);
      z-index: 20;
      touch-action: none;
    }

    #flyingHead {
      position: absolute;
      width: 70px;
      height: auto;
      left: -150px;
      top: -150px;
      display: none;
      z-index: 35;
      pointer-events: none;
    }

    .ball {
      position: absolute;
      width: 45px;
      height: auto;
      left: -100px;
      top: -100px;
      display: none;
      z-index: 30;
      pointer-events: none;
    }

    #buttonArea {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 60;
    }

    button {
      padding: 12px 18px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      background: #fff34d;
      border: 3px solid #222;
      border-radius: 14px;
      box-shadow: 3px 3px 0 #222;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    #stopButton,
    #retryButton {
      display: none;
    }

    .homerunFlash {
      animation: homerunFlash 0.35s infinite;
    }

    @keyframes homerunFlash {
      0% { background: #fff; }
      50% { background: #ffeb3b; }
      100% { background: #fff; }
    }

    .bigFlash {
      animation: bigFlash 0.2s infinite;
    }

    @keyframes bigFlash {
      0% { background: #ff4d4d; }
      33% { background: #fff34d; }
      66% { background: #7ee7ff; }
      100% { background: #ff4d4d; }
    }

    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }

    .flyBallSpin {
      animation: flyBallSpin 2s ease-out forwards;
    }

    @keyframes flyBallSpin {
      0% {
        left: 52%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.8) rotate(0deg);
      }

      100% {
        left: 120%;
        top: 5%;
        transform: translate(-50%, -50%) scale(2) rotate(720deg);
      }
    }

    .flyBallBigSpin {
      animation: flyBallBigSpin 2.2s ease-out forwards;
    }

    @keyframes flyBallBigSpin {
      0% {
        left: 43%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.9) rotate(0deg);
      }

      100% {
        left: 125%;
        top: -10%;
        transform: translate(-50%, -50%) scale(2.8) rotate(1080deg);
      }
    }

    .flyHeadBigSpin {
      animation: flyHeadBigSpin 2.2s ease-out forwards;
    }

    @keyframes flyHeadBigSpin {
      0% {
        left: 61%;
        top: 68%;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }

      100% {
        left: 140%;
        top: -15%;
        transform: translate(-50%, -50%) scale(3) rotate(1080deg);
      }
    }
  </style>
  </head>
<body>
  <div id="game">
    <div id="field">
  <div id="titleArea">
    <h1>長尾バッティング</h1>
    <h2>ねらえ！ホームラン！</h2>
  </div>

  <div id="message">プレイボールを押してね</div>

  <img id="head" src="img/atama1.png" alt="頭">
  <img id="body" src="img/karada1.png" alt="体">

  <img id="flyingHead" src="img/atama4.png" alt="飛ぶ頭">

  <img id="ball1" class="ball" src="img/ball1.png" alt="ボール1">
  <img id="ball2" class="ball" src="img/ball2.png" alt="ボール2">
  <img id="ball3" class="ball" src="img/ball3.png" alt="ボール3">
  <img id="ball4" class="ball" src="img/ball4.png" alt="ボール4">

  <div id="buttonArea">
    <button id="startButton">プレイボール</button>
    <button id="stopButton">ここだ！</button>
    <button id="retryButton">もう一回</button>
  </div>

</div>
      </div>
  <script>
    const field = document.getElementById("field");
    const head = document.getElementById("head");
    const body = document.getElementById("body");
    const flyingHead = document.getElementById("flyingHead");

    const ball1 = document.getElementById("ball1");
    const ball2 = document.getElementById("ball2");
    const ball3 = document.getElementById("ball3");
    const ball4 = document.getElementById("ball4");

    const message = document.getElementById("message");

    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const retryButton = document.getElementById("retryButton");

    /* 調整する場所 */
    const headStartOffsetX = -30;

    const targetX = 165;
    const targetY = 430;

    const successRange = 60;

    /* atama4特殊演出の確率 */
    const specialRate = 0.05;

    /* 画像を差し替えた時だけ数字を増やす */
    const imageVersion = "?v=3";

    let headX = 0;
    let headY = -100;

    let falling = false;
    let specialMode = false;

    let animationId = null;
    let bodyTimer = null;
    let bodyFrame = 1;

    let isDragging = false;
    let dragOffsetY = 0;

    let timers = [];

    function image(fileName) {
      return "img/" + fileName + imageVersion;
    }

    function wait(callback, time) {
      const timer = setTimeout(callback, time);
      timers.push(timer);
    }

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
    }

    function setHeadPosition() {
      head.style.left = headX + "px";
      head.style.top = headY + "px";
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function getDistanceFromTarget() {
      const dx = headX - targetX;
      const dy = headY - targetY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resetBall(ball) {
      ball.classList.remove("flyBallSpin");
      ball.classList.remove("flyBallBigSpin");
      ball.style.display = "none";
      ball.style.left = "-100px";
      ball.style.top = "-100px";
    }

    function showBall(ball) {
      ball.style.display = "block";
      ball.style.left = "52%";
      ball.style.top = "68%";
      ball.style.transform = "translate(-50%, -50%)";
    }

    function flyNormalBall(ball) {
      ball.classList.remove("flyBallSpin");
      void ball.offsetWidth;
      ball.classList.add("flyBallSpin");
    }

    function flyBigBall(ball) {
      ball.classList.remove("flyBallBigSpin");
      void ball.offsetWidth;
      ball.classList.add("flyBallBigSpin");
    }

    function clearEffects() {
      field.classList.remove("homerunFlash");
      field.classList.remove("bigFlash");
      field.classList.remove("shake");

      resetBall(ball1);
      resetBall(ball2);
      resetBall(ball3);
      resetBall(ball4);

      flyingHead.classList.remove("flyHeadBigSpin");
      flyingHead.style.display = "none";
      flyingHead.style.left = "-150px";
      flyingHead.style.top = "-150px";
    }

    function stopBodyAnimation() {
      if (bodyTimer !== null) {
        clearInterval(bodyTimer);
        bodyTimer = null;
      }
    }

    function startBodyAnimation() {
      stopBodyAnimation();

      bodyFrame = 1;
      body.src = image("karada1.png");

      bodyTimer = setInterval(() => {
        if (bodyFrame === 1) {
          body.src = image("karada2.png");
          bodyFrame = 2;
        } else {
          body.src = image("karada1.png");
          bodyFrame = 1;
        }
      }, 1000);
    }

    function hideHead() {
      head.style.display = "none";
    }

    function showHead() {
      head.style.display = "block";
    }

    function showRetry() {
      stopButton.style.display = "none";
      retryButton.style.display = "inline-block";
    }

    function startGame() {
      clearTimers();
      clearEffects();
      stopBodyAnimation();

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      specialMode = Math.random() < specialRate;

      startButton.style.display = "none";
      retryButton.style.display = "none";
      stopButton.style.display = "inline-block";

      showHead();

      /* 通常のkarada1・2は幅200px */
      body.style.width = "200px";

      const fieldRect = field.getBoundingClientRect();

      if (specialMode) {
        startSpecialAtama4(fieldRect);
        return;
      }

      message.textContent = "顔をハメろ！";

      head.src = image("atama1.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";

      headX = fieldRect.width / 2 + headStartOffsetX;
      headY = -100;

      falling = true;

      setHeadPosition();
      startBodyAnimation();

      normalFallLoop();
    }

    function normalFallLoop() {
      if (!falling) return;

      const distance = getDistanceFromTarget();

      if (distance < 100) {
        headY += 0.65;
        message.textContent = "思い出せー！";
      } else {
        headY += 3.2;
        message.textContent = "顔をハメろ！";
      }

      if (headY > field.clientHeight - 40) {
        headX = field.clientWidth / 2 + headStartOffsetX;
        headY = -100;
      }

      setHeadPosition();

      animationId = requestAnimationFrame(normalFallLoop);
    }

    function startSpecialAtama4(fieldRect) {
      specialMode = true;
      falling = false;

      stopBodyAnimation();

      message.textContent = "な、なんだあれは！？";
      stopButton.style.display = "none";

      head.src = image("atama4.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      showHead();

      const direction = Math.floor(Math.random() * 4);

      if (direction === 0) {
        headX = fieldRect.width / 2;
        headY = -100;
      } else if (direction === 1) {
        headX = fieldRect.width / 2;
        headY = fieldRect.height + 100;
      } else if (direction === 2) {
        headX = -100;
        headY = targetY;
      } else {
        headX = fieldRect.width + 100;
        headY = targetY;
      }

      setHeadPosition();

      const startX = headX;
      const startY = headY;
      const startTime = performance.now();
      const duration = 1100;

      function specialMove(now) {
        const progress = Math.min((now - startTime) / duration, 1);

        headX = startX + (targetX - startX) * progress;
        headY = startY + (targetY - startY) * progress;

        setHeadPosition();

        if (progress < 1) {
          requestAnimationFrame(specialMove);
        } else {
          wait(() => {
            bigHomerun(true);
          }, 300);
        }
      }

      requestAnimationFrame(specialMove);
    }

    function stopHead() {
      if (!falling || specialMode) return;

      falling = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      stopBodyAnimation();

      const distance = getDistanceFromTarget();

      if (distance > successRange) {
        out();
        return;
      }

      if (Math.random() < 0.8) {
        out();
        return;
      }

      hitLottery();
    }

    function hitLottery() {
      const hitLuck = Math.random();

      if (hitLuck < 0.5) {
        hit();
      } else if (hitLuck < 0.8) {
        homerun();
      } else {
        bigHomerun(false);
      }
    }

    function out() {
      head.src = image("atama1.png");

      headX += randomRange(-45, 45);
      headY += randomRange(-25, 25);

      const angle = randomRange(-25, 25);

      head.style.transform =
        "translateX(-50%) rotate(" + angle + "deg)";

      setHeadPosition();

      field.classList.add("shake");
      message.textContent = "首がズレたーー！？";

      wait(() => {
        message.textContent = "アウト！もう一回！";
        showRetry();
      }, 500);
    }

    function hit() {
      message.textContent = "ヒット！！";

      head.src = image("atama1.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      headX = targetX;
      headY = targetY;
      setHeadPosition();

      etNormalBody();
      body.src = image("karada1.png");

      wait(() => {
        etNormalBody();
        body.src = image("karada2.png");
      }, 1000);

      wait(() => {
        body.src = image("karada4-1.png");
        body.style.width = "300px";
        hideHead();
      }, 2000);

      wait(() => {
        body.src = image("karada5-1.png");
        showBall(ball1);
      }, 3000);

      wait(() => {
        flyNormalBall(ball1);
      }, 4000);

      wait(() => {
        message.textContent = "ヒット！もう一回！";
        showRetry();
      }, 6200);
    }

    function homerun() {
      message.textContent = "ホームラン確定！！";

      head.src = image("atama3.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      headX = targetX;
      headY = targetY;
      setHeadPosition();

      field.classList.add("homerunFlash");

      etNormalBody();
      body.src = image("karada1.png");

      wait(() => {
        etNormalBody();
        body.src = image("karada2.png");
      }, 1000);

      wait(() => {
        body.src = image("karada4-2.png");
        body.style.width = "300px";
        hideHead();
      }, 2000);

      wait(() => {
        body.src = image("karada5-2.png");
        showBall(ball1);
      }, 3000);

      wait(() => {
        resetBall(ball1);
        showBall(ball2);
      }, 4000);

      wait(() => {
        resetBall(ball2);
        showBall(ball1);
        flyNormalBall(ball1);
      }, 6000);

      wait(() => {
        message.textContent = "ホームラン！もう一回！";
        showRetry();
      }, 8200);
    }

    function bigHomerun(special) {
      if (special) {
        message.textContent = "確定！！大ホームラン！！";
      } else {
        message.textContent = "大ホームラン確定！！";
      }

      head.src = image("atama4.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      headX = targetX;
      headY = targetY;
      showHead();
      setHeadPosition();

      field.classList.add("bigFlash");

      etNormalBody();
      body.src = image("karada1.png");

      wait(() => {
        etNormalBody();
        body.src = image("karada2.png");
      }, 1000);

      wait(() => {
        body.src = image("karada4-3.png");
        body.style.width = "300px";
        hideHead();
      }, 2000);

      wait(() => {
        body.src = image("karada5-3.png");
        showBall(ball1);
      }, 3000);

      wait(() => {
        resetBall(ball1);
        showBall(ball2);
      }, 4000);

      wait(() => {
        resetBall(ball2);
        showBall(ball3);
      }, 5000);

      wait(() => {
        resetBall(ball3);
        showBall(ball4);
      }, 6000);

      wait(() => {
        resetBall(ball4);

        showBall(ball1);
        ball1.style.left = "43%";
        ball1.style.top = "68%";
        flyBigBall(ball1);

        flyingHead.src = image("atama4.png");
        flyingHead.style.display = "block";
        flyingHead.style.left = "61%";
        flyingHead.style.top = "68%";
        flyingHead.style.transform = "translate(-50%, -50%)";

        flyingHead.classList.remove("flyHeadBigSpin");
        void flyingHead.offsetWidth;
        flyingHead.classList.add("flyHeadBigSpin");
      }, 8000);

      wait(() => {
        message.textContent = "大ホームラン！！！もう一回！";
        showRetry();
      }, 10500);
    }

    head.addEventListener("pointerdown", (e) => {
      if (!falling || specialMode) return;

      isDragging = true;
      head.setPointerCapture(e.pointerId);

      const rect = head.getBoundingClientRect();
      dragOffsetY = e.clientY - rect.top;

      e.preventDefault();
    });

    head.addEventListener("pointermove", (e) => {
      if (!isDragging || !falling || specialMode) return;

      const fieldRect = field.getBoundingClientRect();

      headX = e.clientX - fieldRect.left;
      headY = e.clientY - fieldRect.top - dragOffsetY;

      if (headX < 30) headX = 30;

      if (headX > fieldRect.width - 30) {
        headX = fieldRect.width - 30;
      }

      if (headY < -80) headY = -80;

      if (headY > fieldRect.height - 40) {
        headY = fieldRect.height - 40;
      }

      setHeadPosition();

      e.preventDefault();
    });

    head.addEventListener("pointerup", () => {
      isDragging = false;
    });

    head.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    startButton.addEventListener("click", startGame);
    stopButton.addEventListener("click", stopHead);
    retryButton.addEventListener("click", startGame);
  </script>
</body>
</html>

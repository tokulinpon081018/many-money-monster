<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾バッティング</title>
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>

  <div id="game">

    <div id="field">

      <div id="titleArea">
        <h1>長尾バッティング</h1>
        <h2>ねらえ！ホームラン！</h2>
      </div>

      <div id="message">プレイボールを押してね</div>

      <div id="targetCircle"></div>

      <img id="head" src="img/atama1.png" alt="頭">
      <img id="body" src="img/karada1.png" alt="体">

      <div id="buttonArea">
        <button id="startButton">プレイボール</button>
        <button id="stopButton">ここだ！</button>
        <button id="retryButton">もう一回</button>
      </div>

    </div>

  </div>

  <script src="script.js?v=10"></script>
</body>
</html>

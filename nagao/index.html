<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾バッティング</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #dff3ff;
      text-align: center;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      padding: 8px;
    }

    /* 黒いゲーム枠 */
    #field {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      overflow: hidden;
      border: 4px solid #222;
      border-radius: 18px;
      background: linear-gradient(
        #bdefff 0%,
        #bdefff 56%,
        #8fd36b 57%,
        #62b94f 100%
      );
    }

    /* タイトル */
    #titleArea {
      position: absolute;
      top: 8px;
      left: 0;
      width: 100%;
      z-index: 30;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #222;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    h2 {
      margin: 2px 0 0;
      font-size: 18px;
      color: #d12b2b;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    /* メッセージ */
    #message {
      position: absolute;
      top: 72px;
      left: 0;
      width: 100%;
      z-index: 30;
      font-size: 23px;
      font-weight: bold;
      color: #222;
      text-shadow: 2px 2px 0 #fff;
    }

    /* 身体の大きさ・位置 */
    #body {
      position: absolute;
      width: 200px;
      left: 50%;
      bottom: -20px;
      transform: translateX(-50%);
      z-index: 5;
    }

    /* 頭の大きさ・位置 */
    #head {
      position: absolute;
      width: 70px !important;
      max-width: 70px !important;
      height: auto !important;
      left: 50%;
      top: -100px;
      transform: translateX(-50%);
      z-index: 10;
      touch-action: none;
    }

    /* ボール */
    #ball {
      position: absolute;
      width: 45px;
      height: auto;
      left: -100px;
      top: -100px;
      z-index: 20;
      display: none;
      pointer-events: none;
    }

    /* ボタン */
    #buttonArea {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 40;
    }

    button {
      padding: 12px 18px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      background: #fff34d;
      border: 3px solid #222;
      border-radius: 14px;
      box-shadow: 3px 3px 0 #222;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    #stopButton,
    #retryButton {
      display: none;
    }

    /* ホームラン時 */
    .homerunFlash {
      animation: homerunFlash 0.35s infinite;
    }

    @keyframes homerunFlash {
      0% { background: #fff; }
      50% { background: #ffeb3b; }
      100% { background: #fff; }
    }

    /* 大ホームラン時 */
    .bigFlash {
      animation: bigFlash 0.2s infinite;
    }

    @keyframes bigFlash {
      0% { background: #ff4d4d; }
      33% { background: #fff34d; }
      66% { background: #7ee7ff; }
      100% { background: #ff4d4d; }
    }

    /* アウト時 */
    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }

    /* 通常のボール飛行。回転なし */
    .flyBall {
      animation: flyBall 1.0s ease-out forwards;
    }

    @keyframes flyBall {
      0% {
        left: 52%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.7);
      }

      100% {
        left: 120%;
        top: 5%;
        transform: translate(-50%, -50%) scale(1.8);
      }
    }

    /* 大ホームランのボール飛行。回転なし */
    .flyBallBig {
      animation: flyBallBig 1.1s ease-out forwards;
    }

    @keyframes flyBallBig {
      0% {
        left: 52%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.8);
      }

      100% {
        left: 130%;
        top: -10%;
        transform: translate(-50%, -50%) scale(3);
      }
    }
  </style>
</head>

<body>

  <div id="game">
    <div id="field">

      <div id="titleArea">
        <h1>長尾バッティング</h1>
        <h2>ねらえ！ホームラン！</h2>
      </div>

      <div id="message">プレイボールを押してね</div>

      <img id="head" src="img/atama2.png" alt="頭">
      <img id="body" src="img/karada1.png" alt="体">
      <img id="ball" src="img/ball1.png" alt="ボール">

      <div id="buttonArea">
        <button id="startButton">プレイボール</button>
        <button id="stopButton">ここだ！</button>
        <button id="retryButton">もう一回</button>
      </div>

    </div>
  </div>

  <script>
    const head = document.getElementById("head");
    const body = document.getElementById("body");
    const ball = document.getElementById("ball");
    const field = document.getElementById("field");
    const message = document.getElementById("message");

    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const retryButton = document.getElementById("retryButton");

    /* 画像キャッシュ対策。
       画像を差し替えた時は 1 を 2、3… と増やす */
    const imageVersion = "?v=1";

    let headX = 0;
    let headY = -100;
    let falling = false;
    let specialMode = false;

    let animationId = null;
    let bodyTimer = null;
    let bodyFrame = 1;
    let timers = [];

    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    /* =========================
       微調整する場所
    ========================== */

    /* 落下開始位置。左へ寄せたいなら -50 など */
    const headStartOffsetX = -30;

    /* 頭が身体にハマる位置 */
    const targetX = 165;
    const targetY = 430;

    /* ヒット時のatama2位置 */
　　　const hitX = 150;
　　　const hitY = 400;

　　　/* ホームラン時のatama2位置 */
　　　const homerunX = 150;
　　　const homerunY = 400;

　　　/* 大ホームラン時のatama3位置 */
　　　const bigHomerunX = 150;
　　　const bigHomerunY = 400;

　　　/* atama4確定演出の位置 */
　　　const specialX = 165;
　　　const specialY = 430;

    /* 押した位置の判定。大きいほど当たりやすい */
    const successRange = 60;

    /* atama4が来る確率 5% */
    const specialRate = 0.05;

    /* ========================= */

    function image(name) {
      return "img/" + name + imageVersion;
    }

    function wait(callback, time) {
      const timer = setTimeout(callback, time);
      timers.push(timer);
    }

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
    }

    function setHeadPosition() {
      head.style.left = headX + "px";
      head.style.top = headY + "px";
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function getDistanceFromTarget() {
      const dx = headX - targetX;
      const dy = headY - targetY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function clearEffects() {
      field.classList.remove("homerunFlash");
      field.classList.remove("bigFlash");
      field.classList.remove("shake");

      ball.classList.remove("flyBall");
      ball.classList.remove("flyBallBig");
      ball.style.display = "none";
    }

    /* 待機中の身体揺れ */
    function startBodyAnimation() {
      stopBodyAnimation();

      bodyFrame = 1;

      bodyTimer = setInterval(() => {
        if (bodyFrame === 1) {
          body.src = image("karada2.png");
          bodyFrame = 2;
        } else {
          body.src = image("karada1.png");
          bodyFrame = 1;
        }
      }, 180);
    }

    function stopBodyAnimation() {
      if (bodyTimer !== null) {
        clearInterval(bodyTimer);
        bodyTimer = null;
      }
    }

    function startGame() {
      clearTimers();
      clearEffects();
      stopBodyAnimation();

      specialMode = Math.random() < specialRate;

      startButton.style.display = "none";
      retryButton.style.display = "none";
      stopButton.style.display = "inline-block";

      body.src = image("karada1.png");

      const fieldRect = field.getBoundingClientRect();

      if (specialMode) {
        startSpecialAtama4(fieldRect);
        return;
      }

      message.textContent = "顔をハメろ！";

      /* ❶ atama2が揺れずにまっすぐ降りてくる */
      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";

      headX = fieldRect.width / 2 + headStartOffsetX;
      headY = -100;

      falling = true;
      setHeadPosition();

      startBodyAnimation();

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
      }

      normalFallLoop();
    }

    /* 通常落下 */
    function normalFallLoop() {
      if (!falling) return;

      const distance = getDistanceFromTarget();

      /* ❸ 「思い出せー！」で超スロー */
      if (distance < 100) {
        headY += 0.65;
        message.textContent = "思い出せー！";
      } else {
        headY += 3.2;
        message.textContent = "顔をハメろ！";
      }

      /* 横揺れなし。まっすぐ落ちる */

      if (headY > field.clientHeight - 40) {
        headX = field.clientWidth / 2 + headStartOffsetX;
        headY = -100;
      }

      setHeadPosition();
      animationId = requestAnimationFrame(normalFallLoop);
    }

    /* 5%のatama4特殊演出 */
    function startSpecialAtama4(fieldRect) {
      specialMode = true;
      falling = false;

      stopBodyAnimation();

      message.textContent = "な、なんだあれは！？";
      stopButton.style.display = "none";

      head.src = image("atama4.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";

      const direction = Math.floor(Math.random() * 4);

      if (direction === 0) {
        /* 上から */
        headX = fieldRect.width / 2;
        headY = -100;
      } else if (direction === 1) {
        /* 下から */
        headX = fieldRect.width / 2;
        headY = fieldRect.height + 100;
      } else if (direction === 2) {
        /* 左から */
        headX = -100;
        headY = targetY;
      } else {
        /* 右から */
        headX = fieldRect.width + 100;
        headY = targetY;
      }

      setHeadPosition();

      const startX = headX;
      const startY = headY;
      const startTime = performance.now();
      const duration = 1100;

      function specialMove(now) {
        const progress = Math.min((now - startTime) / duration, 1);

        headX = startX + (targetX - startX) * progress;
        headY = startY + (targetY - startY) * progress;

        setHeadPosition();

        if (progress < 1) {
          requestAnimationFrame(specialMove);
        } else {
          wait(() => {
            bigHomerun(true);
          }, 180);
        }
      }

      requestAnimationFrame(specialMove);
    }

    /* ❷ ボタンを押した時 */
    function stopHead() {
      if (!falling || specialMode) return;

      falling = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      stopBodyAnimation();

      const distance = getDistanceFromTarget();

      /* 位置が違うならアウト */
      if (distance > successRange) {
        out();
        return;
      }

      /*
        位置が合っていても運ゲー
        80% アウト
        20% ヒット抽選へ
      */
      const luck = Math.random();

      if (luck < 0.8) {
        out();
        return;
      }

      hitLottery();
    }

    /*
      20%で当たった中の抽選
      50% ヒット
      30% ホームラン
      20% 大ホームラン
    */
    function hitLottery() {
      const hitLuck = Math.random();

      if (hitLuck < 0.5) {
        hit();
      } else if (hitLuck < 0.8) {
        homerun();
      } else {
        bigHomerun(false);
      }
    }

    /* ❷ ハズレ：ズレてatama1 */
    function out() {
      head.src = image("atama1.png");

      headX += randomRange(-45, 45);
      headY += randomRange(-25, 25);

      const angle = randomRange(-25, 25);
      head.style.transform =
        "translateX(-50%) rotate(" + angle + "deg)";

      setHeadPosition();

      field.classList.add("shake");
      message.textContent = "首がズレたーー！？";

      wait(() => {
        message.textContent = "アウト！もう一回！";
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 450);
    }

    /* ❹ ヒット
       karada3 → karada4 の時に ball1 */
    function hit() {
      headX = targetX;
      headY = targetY;

      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      message.textContent = "ヒット！！";

      body.src = image("karada3.png");

      wait(() => {
        body.src = image("karada4.png");
        showBall("ball1.png", false);
      }, 280);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1200);
    }

    /* ❺ ホームラン
       karada1 → karada2 → karada3 → karada4
       karada3→karada4の時にball1 */
    function homerun() {
      headX = targetX;
      headY = targetY;

      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      field.classList.add("homerunFlash");
      message.textContent = "ホームラン！！";

      body.src = image("karada1.png");

      wait(() => {
        body.src = image("karada2.png");
      }, 170);

      wait(() => {
        body.src = image("karada3.png");
      }, 340);

      wait(() => {
        body.src = image("karada4.png");
        showBall("ball1.png", false);
      }, 510);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1400);
    }

    /* ❻ 大ホームラン
       ホームラン演出に加えて
       ball1 → ball2 → ball3 → ball4 */
    function bigHomerun(special) {
      headX = targetX;
      headY = targetY;

      if (special) {
        head.src = image("atama4.png");
        message.textContent = "確定！！大ホームラン！！";
      } else {
        head.src = image("atama3.png");
        message.textContent = "大ホームラン！！";
      }

      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      field.classList.add("bigFlash");

      body.src = image("karada1.png");

      wait(() => {
        body.src = image("karada2.png");
      }, 170);

      wait(() => {
        body.src = image("karada3.png");
      }, 340);

      wait(() => {
        body.src = image("karada4.png");
        showBall("ball1.png", true);
      }, 510);

      wait(() => {
        showBall("ball2.png", true);
      }, 730);

      wait(() => {
        showBall("ball3.png", true);
      }, 950);

      wait(() => {
        showBall("ball4.png", true);
      }, 1170);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1800);
    }

    /* ボールを表示して飛ばす。回転なし */
    function showBall(fileName, isBig) {
      ball.src = image(fileName);
      ball.style.display = "block";

      ball.classList.remove("flyBall");
      ball.classList.remove("flyBallBig");

      void ball.offsetWidth;

      if (isBig) {
        ball.classList.add("flyBallBig");
      } else {
        ball.classList.add("flyBall");
      }
    }

    /* 頭を指で動かす */
    head.addEventListener("pointerdown", (e) => {
      if (!falling || specialMode) return;

      isDragging = true;
      head.setPointerCapture(e.pointerId);

      const rect = head.getBoundingClientRect();
      dragOffsetX = e.clientX - rect.left;
      dragOffsetY = e.clientY - rect.top;

      e.preventDefault();
    });

    head.addEventListener("pointermove", (e) => {
      if (!isDragging || !falling || specialMode) return;

      const fieldRect = field.getBoundingClientRect();

      headX = e.clientX - fieldRect.left;
      headY = e.clientY - fieldRect.top - dragOffsetY;

      if (headX < 30) headX = 30;
      if (headX > fieldRect.width - 30) {
        headX = fieldRect.width - 30;
      }

      if (headY < -80) headY = -80;
      if (headY > fieldRect.height - 40) {
        headY = fieldRect.height - 40;
      }

      setHeadPosition();
      e.preventDefault();
    });

    head.addEventListener("pointerup", () => {
      isDragging = false;
    });

    head.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    startButton.addEventListener("click", startGame);
    stopButton.addEventListener("click", stopHead);
    retryButton.addEventListener("click", startGame);
  </script>

</body>
</html>

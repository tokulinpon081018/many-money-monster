<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾バッティング</title>

  <!-- =========================
       CSS：見た目・大きさ・位置
  ========================== -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #dff3ff;
      text-align: center;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      padding: 8px;
    }

    /* 黒いゲーム枠 */
    #field {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      background: linear-gradient(
        #bdefff 0%,
        #bdefff 56%,
        #8fd36b 57%,
        #62b94f 100%
      );
      border: 4px solid #222;
      border-radius: 18px;
      overflow: hidden;
    }

    /* タイトル */
    #titleArea {
      position: absolute;
      top: 8px;
      left: 0;
      width: 100%;
      z-index: 20;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #222;
      line-height: 1.1;
      text-shadow: 2px 2px 0 white;
    }

    h2 {
      margin: 2px 0 0;
      font-size: 18px;
      color: #d12b2b;
      line-height: 1.1;
      text-shadow: 2px 2px 0 white;
    }

    /* メッセージ */
    #message {
      position: absolute;
      top: 72px;
      left: 0;
      width: 100%;
      z-index: 20;
      font-size: 23px;
      font-weight: bold;
      color: #222;
      text-shadow: 2px 2px 0 white;
    }

    /* 身体の画像 */
    #body {
      position: absolute;

      /* 身体の大きさ：大きくしたいなら 220px、小さくしたいなら 180px */
      width: 200px;

      left: 50%;

      /* 身体の上下位置：もっと下げるなら -40px */
      bottom: -20px;

      transform: translateX(-50%);
      z-index: 2;
    }

    /* 頭の画像 */
    #head {
      position: absolute;

      /* 頭の大きさ：小さくしたいなら 60px、大きくしたいなら 80px */
      width: 70px !important;
      max-width: 70px !important;
      height: auto !important;

      left: 50%;
      top: -100px;
      transform: translateX(-50%) rotate(-5deg);
      z-index: 4;
      touch-action: none;
    }

    /* ターゲット円は不要なので非表示 */
    #targetCircle {
      display: none;
    }

    /* ボタンを右下へ */
    #buttonArea {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 30;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    button {
      margin: 0;
      padding: 12px 18px;
      font-size: 20px;
      font-weight: bold;
      border: 3px solid #222;
      border-radius: 14px;
      background: #fff34d;
      box-shadow: 3px 3px 0 #222;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    #stopButton,
    #retryButton {
      display: none;
    }

    .success {
      animation: flash 0.4s infinite;
    }

    @keyframes flash {
      0% { background: #fff; }
      50% { background: #ffeb3b; }
      100% { background: #fff; }
    }

    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>

  <!-- =========================
       HTML：画面の部品
  ========================== -->
  <div id="game">
    <div id="field">

      <div id="titleArea">
        <h1>長尾バッティング</h1>
        <h2>ねらえ！ホームラン！</h2>
      </div>

      <div id="message">プレイボールを押してね</div>

      <div id="targetCircle"></div>

      <img id="head" src="img/atama1.png" alt="頭">
      <img id="body" src="img/karada1.png" alt="体">

      <div id="buttonArea">
        <button id="startButton">プレイボール</button>
        <button id="stopButton">ここだ！</button>
        <button id="retryButton">もう一回</button>
      </div>

    </div>
  </div>

  <!-- =========================
       JavaScript：動き・判定
  ========================== -->
  <script>
    const head = document.getElementById("head");
    const body = document.getElementById("body");
    const field = document.getElementById("field");
    const message = document.getElementById("message");

    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const retryButton = document.getElementById("retryButton");

    let headX = 0;
    let headY = -100;

    let falling = false;
    let fallSpeed = 3.2;
    let animationId = null;

    let bodyFrame = 1;
    let bodyTimer = null;

    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    /* =========================
       微調整ポイント①
       頭が落ち始める左右位置

       -30 → 少し左
       -50 → もっと左
       0   → 中央
       30  → 少し右
    ========================== */
    const headStartOffsetX = -30;

    /* =========================
       微調整ポイント②
       ホームラン時に頭がハマる位置

       targetX：左右
       小さくする → 左へ
       大きくする → 右へ

       targetY：上下
       小さくする → 上へ
       大きくする → 下へ
    ========================== */
    const targetX = 165;
    const targetY = 430;

    /* =========================
       微調整ポイント③
       ホームラン判定のゆるさ

       大きくする → ホームランが出やすい
       小さくする → ホームランが出にくい
    ========================== */
    const successRange = 60;

    function setHeadPosition() {
      head.style.left = headX + "px";
      head.style.top = headY + "px";
    }

    function startBodyAnimation() {
      stopBodyAnimation();

      bodyTimer = setInterval(() => {
        if (bodyFrame === 1) {
          body.src = "img/karada2.png";
          bodyFrame = 2;
        } else {
          body.src = "img/karada1.png";
          bodyFrame = 1;
        }
      }, 180);
    }

    function stopBodyAnimation() {
      if (bodyTimer !== null) {
        clearInterval(bodyTimer);
        bodyTimer = null;
      }
    }

    function startGame() {
      field.classList.remove("success");
      field.classList.remove("shake");

      message.textContent = "顔をハメろ！";

      startButton.style.display = "none";
      retryButton.style.display = "none";
      stopButton.style.display = "inline-block";

      const fieldRect = field.getBoundingClientRect();

      headX = fieldRect.width / 2 + headStartOffsetX;
      headY = -100;

      fallSpeed = 3.2;
      falling = true;

      head.src = "img/atama1.png";
      body.src = "img/karada1.png";

      /* 落ちてくる時の頭の角度 */
      head.style.transform = "translateX(-50%) rotate(-5deg)";

      setHeadPosition();
      startBodyAnimation();

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
      }

      fallLoop();
    }

    function fallLoop() {
      if (!falling) return;

      headY += fallSpeed;

      /* 少し左右に揺れる */
      headX += Math.sin(headY / 25) * 1.5;

      /* 下まで行ったら上に戻す */
      if (headY > field.clientHeight - 40) {
        headX = field.clientWidth / 2 + headStartOffsetX;
        headY = -100;
        message.textContent = "もう一回落ちてくる！";
      }

      const distance = getDistanceFromTarget();

      if (distance < 80) {
        message.textContent = "いまだーー！！";
        fallSpeed = 1.4;
      } else {
        message.textContent = "顔をハメろ！";
        fallSpeed = 3.2;
      }

      setHeadPosition();

      animationId = requestAnimationFrame(fallLoop);
    }

    function stopHead() {
      if (!falling) return;

      falling = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      stopBodyAnimation();

      const beforeDistance = getDistanceFromTarget();

      /* =========================
         運ゲー判定

         まず、押した瞬間がホームラン圏内か見る。
         ホームラン圏内でも80%で首がズレる。
         20%だけ奇跡のホームラン。
      ========================== */
      if (beforeDistance <= successRange) {
        const luck = Math.random();

        if (luck < 0.8) {
          /* 80%で首ズレ */
          headX += randomRange(-45, 45);
          headY += randomRange(-25, 25);

          const angle = randomRange(-25, 25);
          head.style.transform = "translateX(-50%) rotate(" + angle + "deg)";

          message.textContent = "首がズレたーー！？";

          setHeadPosition();

          setTimeout(() => {
            miss();
          }, 400);
        } else {
          /* 20%で成功 */
          message.textContent = "奇跡のピタッ！！";

          setTimeout(() => {
            success();
          }, 300);
        }
      } else {
        /* そもそも位置がズレていた場合 */
        message.textContent = "ぜんぜん違う！";

        setTimeout(() => {
          miss();
        }, 300);
      }
    }

    function success() {
      headX = targetX;
      headY = targetY;

      head.src = "img/atama2.png";
      body.src = "img/karada2.png";

      head.style.left = headX + "px";
      head.style.top = headY + "px";
      head.style.transform = "translateX(-50%) rotate(0deg)";

      field.classList.add("success");
      message.textContent = "ホームラン！！";

      stopButton.style.display = "none";
      retryButton.style.display = "inline-block";
    }

    function miss() {
      field.classList.add("shake");
      message.textContent = "おしい！もう一回！";

      stopButton.style.display = "none";
      retryButton.style.display = "inline-block";
    }

    function getDistanceFromTarget() {
      const dx = headX - targetX;
      const dy = headY - targetY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    /* 指で頭を動かす */
    head.addEventListener("pointerdown", (e) => {
      isDragging = true;
      head.setPointerCapture(e.pointerId);

      const rect = head.getBoundingClientRect();

      dragOffsetX = e.clientX - rect.left;
      dragOffsetY = e.clientY - rect.top;

      e.preventDefault();
    });

    head.addEventListener("pointermove", (e) => {
      if (!isDragging || !falling) return;

      const fieldRect = field.getBoundingClientRect();

      headX = e.clientX - fieldRect.left;
      headY = e.clientY - fieldRect.top - dragOffsetY;

      if (headX < 30) headX = 30;
      if (headX > fieldRect.width - 30) headX = fieldRect.width - 30;
      if (headY < -80) headY = -80;
      if (headY > fieldRect.height - 40) headY = fieldRect.height - 40;

      setHeadPosition();

      e.preventDefault();
    });

    head.addEventListener("pointerup", () => {
      isDragging = false;
    });

    head.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    startButton.addEventListener("click", startGame);
    stopButton.addEventListener("click", stopHead);
    retryButton.addEventListener("click", startGame);
  </script>

</body>
</html>

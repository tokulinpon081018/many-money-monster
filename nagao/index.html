<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>長尾バッティング</title>

  <style>
    /* =========================
       基本設定
    ========================== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #dff3ff;
      text-align: center;
      overflow: hidden;
    }

    #game {
      width: 100vw;
      height: 100dvh;
      padding: 8px;
    }

    /* =========================
       ゲーム全体の黒枠
    ========================== */
    #field {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: calc(100dvh - 16px);
      margin: 0 auto;
      overflow: hidden;
      border: 4px solid #222;
      border-radius: 18px;
      background: linear-gradient(
        #bdefff 0%,
        #bdefff 56%,
        #8fd36b 57%,
        #62b94f 100%
      );
    }

    /* =========================
       タイトル
    ========================== */
    #titleArea {
      position: absolute;
      top: 8px;
      left: 0;
      width: 100%;
      z-index: 50;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      color: #222;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    h2 {
      margin: 2px 0 0;
      font-size: 18px;
      color: #d12b2b;
      line-height: 1.1;
      text-shadow: 2px 2px 0 #fff;
    }

    /* =========================
       メッセージ
    ========================== */
    #message {
      position: absolute;
      top: 72px;
      left: 0;
      width: 100%;
      z-index: 50;
      font-size: 23px;
      font-weight: bold;
      color: #222;
      text-shadow: 2px 2px 0 #fff;
    }

    /* =========================
       身体
       width と bottom を変えると調整できる
    ========================== */
    #body {
      position: absolute;
      width: 200px;
      left: 50%;
      bottom: -20px;
      transform: translateX(-50%);
      z-index: 5;
    }

    /* =========================
       頭
       width を変えると大きさを調整できる
    ========================== */
    #head {
      position: absolute;
      width: 70px !important;
      max-width: 70px !important;
      height: auto !important;
      left: 50%;
      top: -100px;
      transform: translateX(-50%);
      z-index: 20;
      touch-action: none;
    }

    /* 大ホームランで飛んでいくatama3 */
    #flyingHead {
      position: absolute;
      width: 70px;
      height: auto;
      left: -150px;
      top: -150px;
      display: none;
      z-index: 35;
      pointer-events: none;
    }

    /* ボール共通 */
    .ball {
      position: absolute;
      width: 45px;
      height: auto;
      left: -100px;
      top: -100px;
      display: none;
      z-index: 30;
      pointer-events: none;
    }

    /* =========================
       ボタン
    ========================== */
    #buttonArea {
      position: absolute;
      right: 10px;
      bottom: 10px;
      z-index: 60;
    }

    button {
      padding: 12px 18px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
      background: #fff34d;
      border: 3px solid #222;
      border-radius: 14px;
      box-shadow: 3px 3px 0 #222;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none;
    }

    #stopButton,
    #retryButton {
      display: none;
    }

    /* =========================
       ホームランの光
    ========================== */
    .homerunFlash {
      animation: homerunFlash 0.35s infinite;
    }

    @keyframes homerunFlash {
      0% { background: #fff; }
      50% { background: #ffeb3b; }
      100% { background: #fff; }
    }

    /* 大ホームランの光 */
    .bigFlash {
      animation: bigFlash 0.2s infinite;
    }

    @keyframes bigFlash {
      0% { background: #ff4d4d; }
      33% { background: #fff34d; }
      66% { background: #7ee7ff; }
      100% { background: #ff4d4d; }
    }

    /* アウト時の揺れ */
    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }

    /* 普通のボール飛行。回転なし */
    .flyBall {
      animation: flyBall 1.05s ease-out forwards;
    }

    @keyframes flyBall {
      0% {
        left: 52%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.7);
      }

      100% {
        left: 120%;
        top: 5%;
        transform: translate(-50%, -50%) scale(1.8);
      }
    }

    /* 大ホームラン用ボール。回転なし */
    .flyBallBig {
      animation: flyBallBig 1.2s ease-out forwards;
    }

    @keyframes flyBallBig {
      0% {
        left: 52%;
        top: 68%;
        transform: translate(-50%, -50%) scale(0.8);
      }

      100% {
        left: 130%;
        top: -10%;
        transform: translate(-50%, -50%) scale(3);
      }
    }

    /* 大ホームランでatama3が飛んでいく。回転なし */
    .flyHeadBig {
      animation: flyHeadBig 1.25s ease-out forwards;
    }

    @keyframes flyHeadBig {
      0% {
        left: 50%;
        top: 68%;
        transform: translate(-50%, -50%) scale(1);
      }

      100% {
        left: 125%;
        top: -15%;
        transform: translate(-50%, -50%) scale(2.8);
      }
    }
  </style>
</head>

<body>

  <div id="game">
    <div id="field">

      <div id="titleArea">
        <h1>長尾バッティング</h1>
        <h2>ねらえ！ホームラン！</h2>
      </div>

      <div id="message">プレイボールを押してね</div>

      <!-- 頭と身体 -->
      <img id="head" src="img/atama2.png" alt="頭">
      <img id="body" src="img/karada1.png" alt="体">

      <!-- 大ホームラン用：atama3が飛ぶ -->
      <img id="flyingHead" src="img/atama3.png" alt="飛ぶ頭">

      <!-- ボール -->
      <img id="ball1" class="ball" src="img/ball1.png" alt="ボール1">
      <img id="ball2" class="ball" src="img/ball2.png" alt="ボール2">
      <img id="ball3" class="ball" src="img/ball3.png" alt="ボール3">
      <img id="ball4" class="ball" src="img/ball4.png" alt="ボール4">

      <div id="buttonArea">
        <button id="startButton">プレイボール</button>
        <button id="stopButton">ここだ！</button>
        <button id="retryButton">もう一回</button>
      </div>

    </div>
  </div>

  <script>
    /* =========================
       画面部品を取得
    ========================== */
    const field = document.getElementById("field");
    const head = document.getElementById("head");
    const body = document.getElementById("body");
    const flyingHead = document.getElementById("flyingHead");

    const ball1 = document.getElementById("ball1");
    const ball2 = document.getElementById("ball2");
    const ball3 = document.getElementById("ball3");
    const ball4 = document.getElementById("ball4");

    const message = document.getElementById("message");

    const startButton = document.getElementById("startButton");
    const stopButton = document.getElementById("stopButton");
    const retryButton = document.getElementById("retryButton");

    /* =========================
       微調整する場所
    ========================== */

    /* 落ちてくる頭の開始位置
       -30なら少し左
       -50ならもっと左
       0なら中央 */
    const headStartOffsetX = -30;

    /* 通常、頭が身体にハマる位置 */
    const targetX = 165;
    const targetY = 430;

    /* ヒット時のatama2位置 */
　　　const hitX = 300;
　　　const hitY = 200;

　　　/* ホームラン時のatama2位置 */
　　　const homerunX = 300;
　　　const homerunY = 200;

　　　/* 大ホームラン時のatama3位置 */
　　　const bigHomerunX = 300;
　　　const bigHomerunY = 200;

　　　/* atama4確定演出の位置 */
　　　const specialX = 300;
　　　const specialY = 200;

    /* karada4の瞬間だけ頭を動かす量
       Xを小さくすると左
       Yを小さくすると上 */
    const karada4HeadOffsetX = 50;
    const karada4HeadOffsetY = 50;

    /* 当たり判定の広さ */
    const successRange = 60;

    /* atama4が来る確率。5% */
    const specialRate = 0.05;

    /* 画像を差し替えた時だけ数字を増やす
       例：?v=2 */
    const imageVersion = "?v=1";

    /* =========================
       ゲーム状態
    ========================== */
    let headX = 0;
    let headY = -100;

    let falling = false;
    let specialMode = false;

    let animationId = null;
    let bodyTimer = null;
    let bodyFrame = 1;

    let isDragging = false;
    let dragOffsetY = 0;

    let timers = [];

    /* =========================
       共通関数
    ========================== */

    function image(fileName) {
      return "img/" + fileName + imageVersion;
    }

    function wait(callback, time) {
      const timer = setTimeout(callback, time);
      timers.push(timer);
    }

    function clearTimers() {
      timers.forEach((timer) => clearTimeout(timer));
      timers = [];
    }

    function setHeadPosition() {
      head.style.left = headX + "px";
      head.style.top = headY + "px";
    }

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function getDistanceFromTarget() {
      const dx = headX - targetX;
      const dy = headY - targetY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function resetBall(ball) {
      ball.classList.remove("flyBall");
      ball.classList.remove("flyBallBig");
      ball.style.display = "none";
      ball.style.left = "-100px";
      ball.style.top = "-100px";
    }

    function clearEffects() {
      field.classList.remove("homerunFlash");
      field.classList.remove("bigFlash");
      field.classList.remove("shake");

      resetBall(ball1);
      resetBall(ball2);
      resetBall(ball3);
      resetBall(ball4);

      flyingHead.classList.remove("flyHeadBig");
      flyingHead.style.display = "none";
      flyingHead.style.left = "-150px";
      flyingHead.style.top = "-150px";
    }

    function stopBodyAnimation() {
      if (bodyTimer !== null) {
        clearInterval(bodyTimer);
        bodyTimer = null;
      }
    }

    /* 待機中のkarada1・2の揺れ */
    function startBodyAnimation() {
      stopBodyAnimation();

      bodyFrame = 1;

      bodyTimer = setInterval(() => {
        if (bodyFrame === 1) {
          body.src = image("karada2.png");
          bodyFrame = 2;
        } else {
          body.src = image("karada1.png");
          bodyFrame = 1;
        }
      }, 180);
    }

    function moveHeadForKarada4() {
      headX = targetX + karada4HeadOffsetX;
      headY = targetY + karada4HeadOffsetY;

      head.style.left = headX + "px";
      head.style.top = headY + "px";
    }

    function showBall(ball, big) {
      ball.style.display = "block";

      ball.classList.remove("flyBall");
      ball.classList.remove("flyBallBig");

      void ball.offsetWidth;

      if (big) {
        ball.classList.add("flyBallBig");
      } else {
        ball.classList.add("flyBall");
      }
    }

    /* =========================
       ゲーム開始
    ========================== */
    function startGame() {
      clearTimers();
      clearEffects();
      stopBodyAnimation();

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      specialMode = Math.random() < specialRate;

      startButton.style.display = "none";
      retryButton.style.display = "none";
      stopButton.style.display = "inline-block";

      body.src = image("karada1.png");

      const fieldRect = field.getBoundingClientRect();

      /* 5%のatama4特殊演出 */
      if (specialMode) {
        startSpecialAtama4(fieldRect);
        return;
      }

      message.textContent = "顔をハメろ！";

      /* ❶ atama2がまっすぐ降りる */
      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";

      headX = fieldRect.width / 2 + headStartOffsetX;
      headY = -100;

      falling = true;

      setHeadPosition();
      startBodyAnimation();

      normalFallLoop();
    }

    /* =========================
       通常落下
       atama2は横揺れなし
    ========================== */
    function normalFallLoop() {
      if (!falling) return;

      const distance = getDistanceFromTarget();

      /* ❸ 思い出せー！でかなりゆっくり */
      if (distance < 100) {
        headY += 0.65;
        message.textContent = "思い出せー！";
      } else {
        headY += 3.2;
        message.textContent = "顔をハメろ！";
      }

      if (headY > field.clientHeight - 40) {
        headX = field.clientWidth / 2 + headStartOffsetX;
        headY = -100;
      }

      setHeadPosition();

      animationId = requestAnimationFrame(normalFallLoop);
    }

    /* =========================
       atama4特殊演出
       5%でボタンなし大ホームラン
    ========================== */
    function startSpecialAtama4(fieldRect) {
      specialMode = true;
      falling = false;

      stopBodyAnimation();

      message.textContent = "な、なんだあれは！？";
      stopButton.style.display = "none";

      head.src = image("atama4.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";

      const direction = Math.floor(Math.random() * 4);

      if (direction === 0) {
        /* 上から */
        headX = fieldRect.width / 2;
        headY = -100;
      } else if (direction === 1) {
        /* 下から */
        headX = fieldRect.width / 2;
        headY = fieldRect.height + 100;
      } else if (direction === 2) {
        /* 左から */
        headX = -100;
        headY = targetY;
      } else {
        /* 右から */
        headX = fieldRect.width + 100;
        headY = targetY;
      }

      setHeadPosition();

      const startX = headX;
      const startY = headY;
      const startTime = performance.now();
      const duration = 1100;

      function specialMove(now) {
        const progress = Math.min((now - startTime) / duration, 1);

        headX = startX + (targetX - startX) * progress;
        headY = startY + (targetY - startY) * progress;

        setHeadPosition();

        if (progress < 1) {
          requestAnimationFrame(specialMove);
        } else {
          wait(() => {
            bigHomerun(true);
          }, 180);
        }
      }

      requestAnimationFrame(specialMove);
    }

    /* =========================
       ここだ！を押した時
    ========================== */
    function stopHead() {
      if (!falling || specialMode) return;

      falling = false;

      if (animationId !== null) {
        cancelAnimationFrame(animationId);
        animationId = null;
      }

      stopBodyAnimation();

      const distance = getDistanceFromTarget();

      /* 位置が違うならアウト */
      if (distance > successRange) {
        out();
        return;
      }

      /* 80%アウト、20%だけ当たり抽選 */
      const luck = Math.random();

      if (luck < 0.8) {
        out();
        return;
      }

      hitLottery();
    }

    /* =========================
       20%当たりの中の抽選
       50% ヒット
       30% ホームラン
       20% 大ホームラン
    ========================== */
    function hitLottery() {
      const hitLuck = Math.random();

      if (hitLuck < 0.5) {
        hit();
      } else if (hitLuck < 0.8) {
        homerun();
      } else {
        bigHomerun(false);
      }
    }

    /* =========================
       ❷ アウト
       atama1に変わってズレる
    ========================== */
    function out() {
      head.src = image("atama1.png");

      headX += randomRange(-45, 45);
      headY += randomRange(-25, 25);

      const angle = randomRange(-25, 25);

      head.style.transform =
        "translateX(-50%) rotate(" + angle + "deg)";

      setHeadPosition();

      field.classList.add("shake");
      message.textContent = "首がズレたーー！？";

      wait(() => {
        message.textContent = "アウト！もう一回！";
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 450);
    }

    /* =========================
       ❹ ヒット
       karada3 → karada4
       karada4の瞬間にball1
    ========================== */
    function hit() {
      headX = targetX;
      headY = targetY;

      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      message.textContent = "ヒット！！";

      body.src = image("karada3.png");

      wait(() => {
        body.src = image("karada4.png");

        moveHeadForKarada4();

        showBall(ball1, false);
      }, 280);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1200);
    }

    /* =========================
       ❺ ホームラン
       karada1 → 2 → 3 → 4
       karada4の瞬間にball4
    ========================== */
    function homerun() {
      headX = targetX;
      headY = targetY;

      head.src = image("atama2.png");
      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      field.classList.add("homerunFlash");
      message.textContent = "ホームラン！！";

      body.src = image("karada1.png");

      wait(() => {
        body.src = image("karada2.png");
      }, 170);

      wait(() => {
        body.src = image("karada3.png");
      }, 340);

      wait(() => {
        body.src = image("karada4.png");

        moveHeadForKarada4();

        showBall(ball4, false);
      }, 510);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1400);
    }

    /* =========================
       ❻ 大ホームラン
       karada1 → 2 → 3 → 4
       ball1 → ball2 → ball3
       最後にatama3が飛ぶ
    ========================== */
    function bigHomerun(special) {
      headX = targetX;
      headY = targetY;

      if (special) {
        head.src = image("atama4.png");
        message.textContent = "確定！！大ホームラン！！";
      } else {
        head.src = image("atama3.png");
        message.textContent = "大ホームラン！！";
      }

      head.style.transform = "translateX(-50%) rotate(0deg)";
      setHeadPosition();

      field.classList.add("bigFlash");

      body.src = image("karada1.png");

      wait(() => {
        body.src = image("karada2.png");
      }, 170);

      wait(() => {
        body.src = image("karada3.png");
      }, 340);

      wait(() => {
        body.src = image("karada4.png");

        moveHeadForKarada4();

        showBall(ball1, true);
      }, 510);

      wait(() => {
        showBall(ball2, true);
      }, 730);

      wait(() => {
        showBall(ball3, true);
      }, 950);

      wait(() => {
        /* 最後にatama3を飛ばす */
        flyingHead.src = image("atama3.png");
        flyingHead.style.display = "block";

        flyingHead.classList.remove("flyHeadBig");

        void flyingHead.offsetWidth;

        flyingHead.classList.add("flyHeadBig");
      }, 1170);

      wait(() => {
        stopButton.style.display = "none";
        retryButton.style.display = "inline-block";
      }, 1850);
    }

    /* =========================
       指で頭を動かす
    ========================== */
    head.addEventListener("pointerdown", (e) => {
      if (!falling || specialMode) return;

      isDragging = true;
      head.setPointerCapture(e.pointerId);

      const rect = head.getBoundingClientRect();
      dragOffsetY = e.clientY - rect.top;

      e.preventDefault();
    });

    head.addEventListener("pointermove", (e) => {
      if (!isDragging || !falling || specialMode) return;

      const fieldRect = field.getBoundingClientRect();

      headX = e.clientX - fieldRect.left;
      headY = e.clientY - fieldRect.top - dragOffsetY;

      if (headX < 30) headX = 30;
      if (headX > fieldRect.width - 30) {
        headX = fieldRect.width - 30;
      }

      if (headY < -80) headY = -80;
      if (headY > fieldRect.height - 40) {
        headY = fieldRect.height - 40;
      }

      setHeadPosition();

      e.preventDefault();
    });

    head.addEventListener("pointerup", () => {
      isDragging = false;
    });

    head.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    startButton.addEventListener("click", startGame);
    stopButton.addEventListener("click", stopHead);
    retryButton.addEventListener("click", startGame);
  </script>

</body>
</html>

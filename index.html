<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Many Money Monster</title>
<style>
  :root{--bg1:#ffeb8a;--bg2:#ff9bd2;--bg3:#8ad8ff;--card:#ffffffee;--ink:#2b2540;--good:#2dbb68;--bad:#ff5c7a;}
  *{box-sizing:border-box} body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));padding:18px;}
  .app{max-width:520px;margin:0 auto;background:var(--card);border:4px solid #fff;border-radius:28px;box-shadow:0 18px 40px #0002;padding:18px;overflow:hidden;}
  .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.badge{font-weight:900;background:#fff;border-radius:999px;padding:8px 12px;box-shadow:0 4px 0 #0001}.hp{font-weight:900;background:#fff1f4;border-radius:999px;padding:8px 12px}
  h1{font-size:28px;line-height:1.05;margin:6px 0 4px;text-align:center}.sub{text-align:center;font-weight:800;color:#6a5c92;margin:0 0 10px}.monsterWrap{display:flex;justify-content:center;align-items:center;margin:6px 0 4px;min-height:190px}.monster{width:210px;height:210px;filter:drop-shadow(0 16px 0 #0002);animation:bob 1.6s infinite ease-in-out}@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
  .name{text-align:center;font-size:24px;font-weight:1000;margin:4px 0 10px}.box{background:#fff;border:3px solid #ffe15a;border-radius:22px;padding:12px;margin:10px 0;box-shadow:0 6px 0 #00000010}.label{font-weight:900;font-size:14px;color:#7a679d;margin-bottom:4px}.sentence{font-size:21px;font-weight:900;line-height:1.35}.hint{background:#fff8cf;border-color:#ffd33d}.hint .sentence{font-size:17px;font-weight:800}.choices{display:grid;gap:12px;margin-top:14px}.choice{border:0;border-radius:20px;padding:16px 14px;font-size:20px;font-weight:1000;color:#fff;box-shadow:0 6px 0 #00000025;touch-action:manipulation}.choice:active{transform:translateY(4px);box-shadow:0 2px 0 #00000025}.c0{background:#ff5c7a}.c1{background:#4f8cff}.c2{background:#31bd74}.message{min-height:58px;text-align:center;font-size:21px;font-weight:1000;line-height:1.35;padding:12px;border-radius:18px;background:#f3f1ff;margin-top:14px}.small{font-size:14px;text-align:center;color:#6a5c92;font-weight:800;margin-top:10px}.next{width:100%;border:0;border-radius:18px;padding:14px;margin-top:12px;font-size:18px;font-weight:1000;background:#2b2540;color:white;box-shadow:0 6px 0 #0004}.hidden{display:none}.clear{font-size:26px;text-align:center;font-weight:1000;padding:25px 10px}.shake{animation:shake .35s}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
</style>
</head>
<body>
<main class="app" id="app">
  <div class="top"><div class="badge" id="stage">STAGE 1</div><div class="hp" id="score">⭐ 0</div></div>
  <h1>Many Money Monster</h1>
  <p class="sub">まちがい英語モンスターをたおそう！</p>
  <div class="monsterWrap"><svg class="monster" id="monster" viewBox="0 0 220 220" aria-label="monster"><ellipse cx="110" cy="197" rx="68" ry="12" fill="#000" opacity=".18"/><path id="body" d="M55 92c0-48 110-48 110 0v63c0 34-25 52-55 52s-55-18-55-52V92z" fill="#8e5cff"/><path d="M65 72 40 25l55 31zM155 72l25-47-55 31z" fill="#8e5cff"/><path d="M54 128c-30 6-34 38-25 56 7-20 20-32 34-33zM166 128c30 6 34 38 25 56-7-20-20-32-34-33z" fill="#8e5cff"/><circle cx="86" cy="111" r="18" fill="#fff"/><circle cx="134" cy="111" r="18" fill="#fff"/><circle cx="90" cy="114" r="8" fill="#2b2540"/><circle cx="130" cy="114" r="8" fill="#2b2540"/><path d="M82 153c18 18 38 18 56 0" fill="none" stroke="#2b2540" stroke-width="7" stroke-linecap="round"/><circle cx="57" cy="141" r="9" fill="#ffb3c5" opacity=".85"/><circle cx="163" cy="141" r="9" fill="#ffb3c5" opacity=".85"/></svg></div>
  <div class="name" id="monsterName">Monster</div>
  <section class="box"><div class="label">👾 モンスターのへんな英語</div><div class="sentence" id="wrong">---</div></section>
  <section class="box hint"><div class="label">💡 ヒント</div><div class="sentence" id="hint">---</div></section>
  <div class="label" style="text-align:center;margin-top:12px;">3つの中からタップして攻撃！</div>
  <div class="choices" id="choices"></div>
  <div class="message" id="message">正しい直し方をえらんでね！</div>
  <button class="next hidden" id="nextBtn">つぎのモンスターへ ➜</button>
  <div class="small">※ これは1枚のHTMLだけで動く版です</div>
</main>
<script>
const monsters=[
{name:'Many Money Monster',wrong:"I don't want many money.",hint:'moneyは数えられない。manyではなく much を使うよ。',answer:'much money',choices:['many moneys','much money','a money'],color:'#8e5cff'},
{name:'A Emails Monster',wrong:'I like to send a emails.',hint:'emails は複数だから a はいらないよ。',answer:'emails',choices:['a emails','emails','an emails'],color:'#ff6f91'},
{name:'Flower Order Monster',wrong:'What do you like flower?',hint:'「どの花が好き？」は What flower do you like? の順番。',answer:'What flower do you like?',choices:['What flower do you like?','What do you like flower?','Do what flower you like?'],color:'#2ec4b6'},
{name:'Like Send Monster',wrong:'I like send a mail.',hint:'like の後ろは sending か to send。ここでは sending が自然。',answer:'I like sending emails.',choices:['I like sending emails.','I like send a mail.','I like sends mail.'],color:'#ff9f1c'},
{name:'Dog Monster',wrong:'I like dog.',hint:'犬全般が好きなら dogs と複数形にするよ。',answer:'I like dogs.',choices:['I like dog.','I like dogs.','I like a dogs.'],color:'#4f8cff'},
{name:'Good English Angel',wrong:'Your brother is tall.',hint:'これは正しい英語。直さなくていいよ。',answer:'そのままでOK',choices:['Your brother tall.','Your brother is tall.','そのままでOK'],color:'#31bd74'}
];
let i=0,score=0,answered=false;
const $=id=>document.getElementById(id);
function render(){answered=false;const m=monsters[i];$('stage').textContent='STAGE '+(i+1);$('score').textContent='⭐ '+score;$('monsterName').textContent=m.name;$('wrong').textContent=m.wrong;$('hint').textContent=m.hint;$('message').textContent='正しい直し方をえらんでね！';$('nextBtn').classList.add('hidden');$('body').setAttribute('fill',m.color);document.querySelectorAll('#monster path').forEach((p,idx)=>{if(idx>=1 && idx<=4)p.setAttribute('fill',m.color)});const choices=$('choices');choices.innerHTML='';m.choices.forEach((c,idx)=>{const b=document.createElement('button');b.className='choice c'+idx;b.textContent=c;b.onclick=()=>choose(c);choices.appendChild(b);});}
function choose(c){if(answered)return;answered=true;const m=monsters[i];if(c===m.answer || (m.name==='Good English Angel' && c==='Your brother is tall.')){score+=10;$('score').textContent='⭐ '+score;$('message').textContent='✅ 正解！モンスターにこうげき成功！';$('message').style.background='#dfffea';}else{$('message').textContent='💥 おしい！正解は「'+m.answer+'」だよ。';$('message').style.background='#ffe3e9';$('app').classList.add('shake');setTimeout(()=>$('app').classList.remove('shake'),350);}document.querySelectorAll('.choice').forEach(b=>b.disabled=true);$('nextBtn').classList.remove('hidden');}
$('nextBtn').onclick=()=>{i++;$('message').style.background='#f3f1ff';if(i>=monsters.length){$('app').innerHTML='<div class="clear">🎉 クリア！<br>スコア '+score+' 点！<br><br><button class="next" onclick="location.reload()">もう一回あそぶ</button></div>';return;}render();};
render();
</script>
</body>
</html>

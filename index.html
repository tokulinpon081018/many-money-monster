<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検5級モンスター Ver.2</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff4c7,#d9f7ff);min-height:100vh;padding:14px;display:flex;justify-content:center}
.game{width:min(460px,100%);background:#fff;border-radius:28px;box-shadow:0 12px 35px rgba(0,0,0,.18);padding:18px}
h1{font-size:24px;margin:0;color:#ff4d8d;text-align:center}
.stage{background:linear-gradient(90deg,#8de77c,#6bd5ff);border-radius:20px;padding:10px;font-weight:900;text-align:center;margin:10px 0}
.monsterArea{text-align:center;background:#f7fbff;border:3px dashed #b9e4ff;border-radius:24px;padding:12px}
.monsterName{font-size:20px;font-weight:900}
.monster{font-size:100px;transition:.3s}
.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-14px)}50%{transform:translateX(14px)}75%{transform:translateX(-8px)}}
.hpbar{height:22px;background:#e7eef5;border-radius:999px;overflow:hidden;border:2px solid #d2dde8}
.hpfill{height:100%;width:100%;background:linear-gradient(90deg,#36d16f,#ffd447,#ff5a7c);transition:.4s}
.progress{text-align:center;font-weight:900;margin:10px;color:#555}
.questionBox{background:#fff9e8;border:3px solid #ffd66b;border-radius:22px;padding:15px;margin:12px 0;text-align:center}
.question{font-size:28px;font-weight:900;color:#263238;cursor:pointer}
.kana{font-size:17px;font-weight:900;color:#ff4d8d;margin-top:6px}
.hint{font-size:14px;background:#fff1b5;border-radius:14px;padding:8px;margin-top:8px;font-weight:700}
.choices{display:grid;gap:10px}
.choice{border:0;border-radius:18px;padding:15px;font-size:18px;font-weight:900;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18)}
.choice:nth-child(1){background:#ff6b8f}.choice:nth-child(2){background:#42a5f5}.choice:nth-child(3){background:#37c978}
.choice:disabled{opacity:.65}
.message{text-align:center;font-size:18px;font-weight:900;margin:12px 0;padding:10px;border-radius:18px;background:#f4f7ff;min-height:48px}
.ok{color:#20b86f}.bad{color:#ff4d6d}
.nextBtn,.restartBtn{width:100%;border:0;border-radius:18px;padding:14px;font-size:18px;font-weight:900;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18);margin-top:8px}
.nextBtn{background:#8e5cff;display:none}.restartBtn{background:#00bcd4}
.clear{font-size:24px;text-align:center;font-weight:900;color:#ff4d8d;background:#fff2fb;border-radius:20px;padding:14px;margin-top:10px;display:none}
.tapStart{position:fixed;inset:0;background:rgba(255,255,255,.96);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.tapStart button{border:0;border-radius:20px;background:#ff5f9c;color:white;font-size:21px;font-weight:900;padding:14px 20px;margin:8px;box-shadow:0 6px 0 rgba(0,0,0,.18)}
.mode{font-weight:900;margin:12px}
.soundNote{text-align:center;font-size:12px;color:#666;margin-top:8px}
</style>
</head>
<body>

<div class="tapStart" id="tapStart">
  <h1>英検5級<br>モンスター Ver.2</h1>
  <p>出題順を選んでね</p>
  <button onclick="startGame(false)">順番どおり</button>
  <button onclick="startGame(true)">ランダム出題</button>
  <div class="mode">英文を押すと発音します 🔊</div>
</div>

<div class="game">
  <h1>英検5級モンスター</h1>
  <div class="stage" id="stageName"></div>

  <div class="monsterArea">
    <div class="monsterName" id="monsterName"></div>
    <div class="monster" id="monster">👾</div>
    <div><b>MONSTER HP</b></div>
    <div class="hpbar"><div class="hpfill" id="hpfill"></div></div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="questionBox">
    <div class="question" id="question" onclick="speakQuestion()"></div>
    <div class="kana" id="kana"></div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="message" id="message">答えを選んで攻撃！</div>
  <button class="nextBtn" id="nextBtn" onclick="nextQuestion()">次の問題へ ▶</button>
  <button class="restartBtn" onclick="restart()">最初から 🔁</button>
  <div class="clear" id="clearBox">🏆 GAME CLEAR!<br>英検5級モンスターをたおした！</div>
  <div class="soundNote">※iPhoneではマナーモード中、音が小さい場合があります。</div>
</div>

<script>
const monsters=[
 {name:'Greeting Monster',stage:'🌱 Stage1 あいさつの森',icon:'🟢'},
 {name:'Family Monster',stage:'🏠 Stage2 家族の洞窟',icon:'🔵'},
 {name:'Number Monster',stage:'🔢 Stage3 数字火山',icon:'🟠'},
 {name:'Food Monster',stage:'🍎 Stage4 食べ物の城',icon:'🟡'},
 {name:'King Eiken',stage:'👑 Stage5 英検5級魔王城',icon:'👑'}
];

const questions=[
{en:'Hello.',kana:'ハロー',jp:'こんにちは',choices:['こんにちは','さようなら','おやすみ'],hint:'会ったときのあいさつ'},
{en:'Good morning.',kana:'グッド モーニング',jp:'おはよう',choices:['こんばんは','おはよう','ありがとう'],hint:'朝のあいさつ'},
{en:'Good night.',kana:'グッド ナイト',jp:'おやすみ',choices:['こんにちは','おやすみ','またね'],hint:'寝る前の言葉'},
{en:'Thank you.',kana:'サンキュー',jp:'ありがとう',choices:['ありがとう','ごめんなさい','どういたしまして'],hint:'感謝する言葉'},
{en:"You're welcome.",kana:'ユア ウェルカム',jp:'どういたしまして',choices:['どういたしまして','ありがとう','こんにちは'],hint:'Thank you. への返事'},
{en:'See you.',kana:'シー ユー',jp:'またね',choices:['またね','おはよう','こんばんは'],hint:'別れるとき'},
{en:'Goodbye.',kana:'グッドバイ',jp:'さようなら',choices:['さようなら','ありがとう','こんにちは'],hint:'別れのあいさつ'},
{en:'How are you?',kana:'ハウ アー ユー',jp:'元気ですか？',choices:['元気ですか？','何歳ですか？','どこですか？'],hint:'調子を聞く'},
{en:"I'm fine.",kana:'アイム ファイン',jp:'元気です',choices:['眠いです','元気です','疲れました'],hint:'How are you? への返事'},
{en:'Nice to meet you.',kana:'ナイス トゥ ミート ユー',jp:'はじめまして',choices:['はじめまして','ありがとう','おやすみ'],hint:'初めて会ったとき'},

{en:'father',kana:'ファーザー',jp:'父',choices:['父','母','兄'],hint:'お父さん'},
{en:'mother',kana:'マザー',jp:'母',choices:['兄','母','姉'],hint:'お母さん'},
{en:'brother',kana:'ブラザー',jp:'兄・弟',choices:['兄・弟','姉・妹','父'],hint:'男のきょうだい'},
{en:'sister',kana:'シスター',jp:'姉・妹',choices:['兄','母','姉・妹'],hint:'女のきょうだい'},
{en:'family',kana:'ファミリー',jp:'家族',choices:['学校','家族','先生'],hint:'家の人たち'},
{en:'grandfather',kana:'グランドファーザー',jp:'祖父',choices:['祖父','祖母','父'],hint:'おじいちゃん'},
{en:'grandmother',kana:'グランドマザー',jp:'祖母',choices:['祖母','母','姉'],hint:'おばあちゃん'},
{en:'uncle',kana:'アンクル',jp:'おじ',choices:['おじ','おば','兄'],hint:'父母の兄弟など'},
{en:'aunt',kana:'アント',jp:'おば',choices:['おば','おじ','母'],hint:'父母の姉妹など'},
{en:'This is my family.',kana:'ディス イズ マイ ファミリー',jp:'これは私の家族です',choices:['これは私の学校です','これは私の家族です','これは私の先生です'],hint:'This is は「これは」'},

{en:'one',kana:'ワン',jp:'1',choices:['1','2','3'],hint:'数字'},
{en:'two',kana:'トゥー',jp:'2',choices:['1','2','5'],hint:'数字'},
{en:'three',kana:'スリー',jp:'3',choices:['2','3','4'],hint:'数字'},
{en:'four',kana:'フォー',jp:'4',choices:['4','5','6'],hint:'数字'},
{en:'five',kana:'ファイブ',jp:'5',choices:['5','7','8'],hint:'数字'},
{en:'six',kana:'シックス',jp:'6',choices:['6','9','10'],hint:'数字'},
{en:'seven',kana:'セブン',jp:'7',choices:['7','8','9'],hint:'数字'},
{en:'eight',kana:'エイト',jp:'8',choices:['8','10','12'],hint:'数字'},
{en:'nine',kana:'ナイン',jp:'9',choices:['7','8','9'],hint:'数字'},
{en:'ten',kana:'テン',jp:'10',choices:['10','11','12'],hint:'数字'},

{en:'apple',kana:'アポー',jp:'りんご',choices:['りんご','みかん','ぶどう'],hint:'赤い果物'},
{en:'banana',kana:'バナーナ',jp:'バナナ',choices:['りんご','バナナ','いちご'],hint:'黄色い果物'},
{en:'bread',kana:'ブレッド',jp:'パン',choices:['牛乳','パン','ごはん'],hint:'朝ごはんにも出る'},
{en:'rice',kana:'ライス',jp:'ごはん',choices:['ごはん','パン','肉'],hint:'日本でよく食べる主食'},
{en:'water',kana:'ウォーター',jp:'水',choices:['水','牛乳','お茶'],hint:'飲み物'},
{en:'milk',kana:'ミルク',jp:'牛乳',choices:['ジュース','牛乳','水'],hint:'白い飲み物'},
{en:'egg',kana:'エッグ',jp:'卵',choices:['卵','肉','魚'],hint:'にわとりから'},
{en:'fish',kana:'フィッシュ',jp:'魚',choices:['魚','鳥','犬'],hint:'海や川にいる'},
{en:'meat',kana:'ミート',jp:'肉',choices:['肉','魚','卵'],hint:'ステーキなど'},
{en:'I like apples.',kana:'アイ ライク アポーズ',jp:'私はりんごが好きです',choices:['私は犬が好きです','私はりんごが好きです','私は魚が好きです'],hint:'I like は「私は好き」'},

{en:'I am Ken.',kana:'アイ アム ケン',jp:'私はケンです',choices:['私はケンです','私は先生です','私は元気です'],hint:'自己紹介'},
{en:'I am ten years old.',kana:'アイ アム テン イヤーズ オールド',jp:'私は10歳です',choices:['私は10歳です','私は10人います','私は10冊持っています'],hint:'年齢を言う'},
{en:'This is a dog.',kana:'ディス イズ ア ドッグ',jp:'これは犬です',choices:['これは猫です','これは犬です','これは鳥です'],hint:'This is は「これは」'},
{en:'Can you swim?',kana:'キャン ユー スウィム',jp:'泳げますか？',choices:['泳げますか？','走れますか？','歌えますか？'],hint:'Can you は「できますか」'},
{en:'Yes, I can.',kana:'イエス アイ キャン',jp:'はい',choices:['いいえ','はい','たぶん'],hint:'Can you? への肯定'},
{en:"No, I can't.",kana:'ノー アイ キャント',jp:'いいえ',choices:['はい','こんにちは','いいえ'],hint:'Can you? への否定'},
{en:'What is your name?',kana:'ワット イズ ユア ネーム',jp:'あなたの名前は何ですか？',choices:['あなたの名前は何ですか？','あなたは何歳ですか？','どこに住んでいますか？'],hint:'name は名前'},
{en:'Where do you live?',kana:'ウェア ドゥー ユー リブ',jp:'どこに住んでいますか？',choices:['何歳ですか？','どこに住んでいますか？','何が好きですか？'],hint:'Where は「どこ」'},
{en:'I like dogs.',kana:'アイ ライク ドッグズ',jp:'私は犬が好きです',choices:['私は犬が好きです','私は猫です','私は犬です'],hint:'dogs は犬たち・犬全般'},
{en:'Your brother is tall.',kana:'ユア ブラザー イズ トール',jp:'あなたの兄弟は背が高いです',choices:['あなたの兄弟は背が高いです','あなたの兄弟は速いです','あなたの兄弟は若いです'],hint:'tall は背が高い'}
];

let order=[];
let pos=0;
let answered=false;
let audioCtx=null;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame(random){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  order=[...Array(questions.length).keys()];
  if(random) shuffle(order);
  document.getElementById('tapStart').style.display='none';
  render();
}

function currentQuestion(){
  return questions[order[pos]];
}

function monsterIndex(){
  return Math.floor(pos/10);
}

function hp(){
  return (10-(pos%10))*10;
}

function render(){
  answered=false;
  const mi=Math.min(monsterIndex(),monsters.length-1);
  const m=monsters[mi];
  const q=currentQuestion();

  document.getElementById('stageName').textContent=m.stage;
  document.getElementById('monsterName').textContent=m.name;
  document.getElementById('monster').textContent=m.icon;
  document.getElementById('hpfill').style.width=hp()+'%';
  document.getElementById('progress').textContent='Question '+(pos+1)+' / '+questions.length;
  document.getElementById('question').textContent=q.en+' 🔊';
  document.getElementById('kana').textContent=q.kana;
  document.getElementById('hint').textContent='ヒント：'+q.hint;
  document.getElementById('message').textContent='答えを選んで攻撃！';
  document.getElementById('message').className='message';
  document.getElementById('nextBtn').style.display='none';

  const choices=document.getElementById('choices');
  choices.innerHTML='';
  q.choices.forEach(c=>{
    const b=document.createElement('button');
    b.className='choice';
    b.textContent=c;
    b.onclick=()=>answer(c);
    choices.appendChild(b);
  });
}

function speakQuestion(){
  const q=currentQuestion();
  const u=new SpeechSynthesisUtterance(q.en);
  u.lang='en-US';
  u.rate=0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function beep(freq,dur,type='sine',gain=.08){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;
  o.frequency.value=freq;
  g.gain.value=gain;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}

function sound(name){
  if(name==='correct'){beep(660,.12);setTimeout(()=>beep(880,.16),110)}
  if(name==='wrong'){beep(180,.22,'sawtooth',.06)}
  if(name==='win'){[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*130))}
  if(name==='clear'){[523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.22),i*180))}
}

function answer(choice){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);

  const q=currentQuestion();
  const msg=document.getElementById('message');

  if(choice===q.jp){
    sound('correct');
    msg.innerHTML='✨ 正解！<br>⚔️ アタック！！';
    msg.className='message ok';
    attack();
  }else{
    sound('wrong');
    msg.innerHTML='❌ おしい！<br>正解は「'+q.jp+'」';
    msg.className='message bad';
    document.getElementById('nextBtn').style.display='block';
  }
}

function attack(){
  const monster=document.getElementById('monster');
  monster.classList.add('shake');

  setTimeout(()=>{
    document.getElementById('hpfill').style.width=Math.max(0,hp()-10)+'%';
  },250);

  setTimeout(()=>{
    monster.classList.remove('shake');

    if((pos+1)%10===0){
      sound('win');
      document.getElementById('message').innerHTML='💥 モンスターをたおした！';
    }

    if(pos===questions.length-1){
      clearGame();
    }else{
      document.getElementById('nextBtn').style.display='block';
    }
  },650);
}

function nextQuestion(){
  pos++;
  if(pos>=questions.length){
    clearGame();
    return;
  }
  render();
}

function clearGame(){
  sound('clear');
  document.getElementById('clearBox').style.display='block';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('message').innerHTML='🏆 全問クリア！すごい！';
}

function restart(){
  pos=0;
  document.getElementById('clearBox').style.display='none';
  document.getElementById('tapStart').style.display='flex';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検5級モンスターバトル</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  background:linear-gradient(135deg,#fff7d6,#e6fff8);
  color:#333;
}

body{
  overflow-x:hidden;
}

.wrap{
  width:100%;
  max-width:430px;
  min-height:100svh;
  margin:0 auto;
  padding:18px 12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:100%;
  min-height:92svh;
  background:white;
  border-radius:22px;
  padding:22px 14px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  text-align:center;
  position:relative;
}

.hidden{
  display:none !important;
}

h1{
  margin:8px 0 10px;
  font-size:28px;
  color:#ff4f9a;
  line-height:1.35;
}

h2{
  margin:8px 0;
  font-size:25px;
  color:#ff4f9a;
  line-height:1.35;
}

p{
  font-size:17px;
  line-height:1.6;
  font-weight:700;
}

.party{
  margin:22px auto 18px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  align-items:center;
  justify-items:center;
}

.party img{
  width:92px;
  height:92px;
  object-fit:contain;
}

.startButtons{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  margin-top:12px;
}

button{
  border:none;
  border-radius:18px;
  padding:14px 18px;
  font-size:18px;
  font-weight:900;
  color:white;
  background:linear-gradient(135deg,#ff4f9a,#ff9d3b);
  box-shadow:0 6px 0 rgba(0,0,0,.18);
  cursor:pointer;
}

button:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 rgba(0,0,0,.18);
}

.subBtn{
  background:linear-gradient(135deg,#1e9bff,#19c37d);
}

.stage{
  font-size:18px;
  font-weight:900;
  color:#0aa36d;
  margin-top:2px;
}

.monsterArea{
  margin-top:10px;
}

.monsterName{
  font-size:20px;
  font-weight:900;
  color:#555;
}

.monsterImg{
  width:145px;
  height:145px;
  object-fit:contain;
  margin:8px auto;
  display:block;
  transition:.18s;
}

.damage{
  animation:shake .25s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-5px)}
  100%{transform:translateX(0)}
}

.hpLabel{
  font-size:13px;
  font-weight:900;
  color:#555;
}

.hpBar{
  width:88%;
  height:18px;
  border-radius:999px;
  background:#eee;
  margin:6px auto 14px;
  overflow:hidden;
  border:2px solid #333;
}

.hpFill{
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#28d17c,#ffd84d,#ff5b5b);
  transition:.25s;
}

.questionBox{
  margin-top:10px;
  padding:14px;
  border-radius:18px;
  background:#fff6df;
  border:3px solid #ffd36a;
}

.question{
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
  cursor:pointer;
}

.hint{
  font-size:15px;
  color:#666;
  font-weight:700;
}

.choices{
  display:grid;
  gap:10px;
  margin-top:14px;
}

.choice{
  width:100%;
  padding:14px;
  border-radius:15px;
  border:3px solid #333;
  background:white;
  color:#333;
  font-size:19px;
  font-weight:900;
  box-shadow:3px 3px 0 #333;
}

.choice:active{
  transform:translate(3px,3px);
  box-shadow:none;
}

.choice.correct{
  background:#31d17c;
  color:white;
  border-color:#118b4e;
}

.choice.wrong{
  background:#ff5c5c;
  color:white;
  border-color:#b82121;
}

.info{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 4px 0;
  font-size:15px;
  font-weight:900;
}

.message{
  min-height:34px;
  margin-top:10px;
  font-size:20px;
  font-weight:900;
  color:#ff4f9a;
}

.clearBox{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.94);
  border-radius:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  padding:20px;
}

.clearText{
  font-size:34px;
  font-weight:900;
  color:#ff4f9a;
  margin-bottom:18px;
}

.small{
  font-size:14px;
  color:#555;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">

    <div id="startScreen">
      <h1>英検5級モンスターバトル</h1>
      <h2>かわいいモンスターと<br>英語バトル！</h2>
      <p>10問正解で1体たおそう！</p>

      <div class="party">
        <img src="img/green_monster.png?v=30" alt="green monster">
        <img src="img/blue_monster.png?v=30" alt="blue monster">
        <img src="img/purple_monster.png?v=30" alt="purple monster">
        <img src="img/orange_monster.png?v=30" alt="orange monster">
        <img src="img/yellow_monster.png?v=30" alt="yellow monster">
      </div>

      <div class="startButtons">
        <button onclick="startGame(false)">⭐ 順番どおり</button>
        <button class="subBtn" onclick="startGame(true)">🎲 ステージ内ランダム</button>
      </div>

      <p class="small">英文をタップすると、もう一度しゃべるよ♪</p>
    </div>

    <div id="gameScreen" class="hidden">
      <h1>英検5級モンスターバトル</h1>

      <div class="stage" id="stageName">STAGE 1</div>

      <div class="monsterArea">
        <div class="monsterName" id="monsterName">Green Monster</div>
        <img id="monsterImage" class="monsterImg" src="img/green_monster.png" alt="monster">
        <div class="hpLabel">MONSTER HP</div>
        <div class="hpBar"><div class="hpFill" id="hpFill"></div></div>
      </div>

      <div class="questionBox">
        <div class="question" id="questionText" onclick="speakCurrent()">Question</div>
        <div class="hint" id="hintText">ヒント</div>
      </div>

      <div class="choices" id="choices"></div>

      <div class="info">
        <div id="countText">1 / 10</div>
        <div id="scoreText">正解 0</div>
      </div>

      <div class="message" id="message"></div>
    </div>

    <div id="clearBox" class="clearBox hidden">
      <div class="clearText">🎉 STAGE CLEAR! 🎉</div>
      <p id="clearMessage">モンスターをたおした！</p>
      <button onclick="nextStage()">次へ</button>
    </div>

  </div>
</div>

<script>
let audioCtx = null;
let stage = 0;
let qpos = 0;
let correctCount = 0;
let answered = false;
let order = [];

const monsters = [
  {
    name:"Green Monster",
    image:"img/green_monster.png?v=30",
    stage:"STAGE 1 あいさつ"
  },
  {
    name:"Blue Monster",
    image:"img/blue_monster.png?v=30",
    stage:"STAGE 2 家族"
  },
  {
    name:"Orange Monster",
    image:"img/orange_monster.png?v=30",
    stage:"STAGE 3 数字"
  },
  {
    name:"Yellow Monster",

const stages = [
  [
    {q:"Good morning.", ja:"おはよう。", a:"おはよう。", c:["おはよう。","おやすみ。","ありがとう。"]},

    {q:"See you.", ja:"またね。", a:"またね。", c:["またね。","はじめまして。","どういたしまして。"]},

    {q:"I'm sorry.", ja:"ごめんなさい。", a:"ごめんなさい。", c:["ごめんなさい。","ありがとう。","いただきます。"]},
    {q:"You're welcome.", ja:"どういたしまして。", a:"どういたしまして。", c:["どういたしまして。","おはよう。","さようなら。"]},
    {q:"Good bye.", ja:"さようなら。", a:"さようなら。", c:["さようなら。","こんばんは。","元気です。"]}
  ],
  [
    {q:"This is my mother.", ja:"こちらは私の母です。", a:"こちらは私の母です。", c:["こちらは私の母です。","こちらは私の兄です。","これは私の犬です。"]},
    {q:"He is my father.", ja:"彼は私の父です。", a:"彼は私の父です。", c:["彼は私の父です。","彼女は私の母です。","これは本です。"]},
    {q:"She is my sister.", ja:"彼女は私の姉妹です。", a:"彼女は私の姉妹です。", c:["彼女は私の姉妹です。","彼は私の先生です。","私は学生です。"]},
    {q:"My brother is tall.", ja:"私の兄弟は背が高いです。", a:"私の兄弟は背が高いです。", c:["私の兄弟は背が高いです。","私の犬は小さいです。","私の母は料理します。"]},
    {q:"I have a cat.", ja:"私は猫を飼っています。", a:"私は猫を飼っています。", c:["私は猫を飼っています。","私は学校へ行きます。","私は本を読みます。"]},
    {q:"This is my family.", ja:"これは私の家族です。", a:"これは私の家族です。", c:["これは私の家族です。","これは私の机です。","これはリンゴです。"]},
    {q:"My father likes soccer.", ja:"私の父はサッカーが好きです。", a:"私の父はサッカーが好きです。", c:["私の父はサッカーが好きです。","私の父は犬です。","私の父は赤いです。"]},
    {q:"My mother cooks dinner.", ja:"私の母は夕食を作ります。", a:"私の母は夕食を作ります。", c:["私の母は夕食を作ります。","私の母は走ります。","私の母は青いです。"]},
    {q:"My sister is kind.", ja:"私の姉妹は親切です。", a:"私の姉妹は親切です。", c:["私の姉妹は親切です。","私の姉妹は魚です。","私の姉妹は古いです。"]},
    {q:"We are happy.", ja:"私たちは幸せです。", a:"私たちは幸せです。", c:["私たちは幸せです。","私たちは本です。","私たちは雨です。"]}
  ],
  [
    {q:"One apple.", ja:"りんご1つ。", a:"りんご1つ。", c:["りんご1つ。","犬2匹。","本5冊。"]},
    {q:"Two dogs.", ja:"犬2匹。", a:"犬2匹。", c:["犬2匹。","猫1匹。","水3杯。"]},
    {q:"Three books.", ja:"本3冊。", a:"本3冊。", c:["本3冊。","ペン1本。","机2つ。"]},
    {q:"Four cats.", ja:"猫4匹。", a:"猫4匹。", c:["猫4匹。","鳥1羽。","車5台。"]},
    {q:"Five pens.", ja:"ペン5本。", a:"ペン5本。", c:["ペン5本。","犬5匹。","リンゴ5つ。"]},
    {q:"I am ten years old.", ja:"私は10歳です。", a:"私は10歳です。", c:["私は10歳です。","私は10時に寝ます。","私は10冊あります。"]},
    {q:"It is seven o'clock.", ja:"7時です。", a:"7時です。", c:["7時です。","7歳です。","7人です。"]},
    {q:"There are six balls.", ja:"ボールが6個あります。", a:"ボールが6個あります。", c:["ボールが6個あります。","ボールが赤いです。","ボールが好きです。"]},
    {q:"Eight birds are in the tree.", ja:"木に鳥が8羽います。", a:"木に鳥が8羽います。", c:["木に鳥が8羽います。","木に犬がいます。","鳥は青いです。"]},
    {q:"Nine students are here.", ja:"9人の生徒がここにいます。", a:"9人の生徒がここにいます。", c:["9人の生徒がここにいます。","9冊の本です。","9時です。"]}
  ],
  [
    {q:"I like apples.", ja:"私はりんごが好きです。", a:"私はりんごが好きです。", c:["私はりんごが好きです。","私は犬が好きです。","私は水を飲みます。"]},
    {q:"I eat breakfast.", ja:"私は朝食を食べます。", a:"私は朝食を食べます。", c:["私は朝食を食べます。","私は本を読みます。","私は走ります。"]},
    {q:"I drink milk.", ja:"私は牛乳を飲みます。", a:"私は牛乳を飲みます。", c:["私は牛乳を飲みます。","私は魚を見ます。","私は学校へ行きます。"]},
    {q:"This cake is good.", ja:"このケーキはおいしいです。", a:"このケーキはおいしいです。", c:["このケーキはおいしいです。","この犬は速いです。","この本は古いです。"]},
    {q:"Do you like rice?", ja:"あなたはご飯が好きですか。", a:"あなたはご飯が好きですか。", c:["あなたはご飯が好きですか。","あなたは泳げますか。","これはご飯ですか。"]},
    {q:"I want water.", ja:"私は水がほしいです。", a:"私は水がほしいです。", c:["私は水がほしいです。","私は水色です。","私は水曜日です。"]},
    {q:"She likes bread.", ja:"彼女はパンが好きです。", a:"彼女はパンが好きです。", c:["彼女はパンが好きです。","彼女はパンを描きます。","彼女はパンです。"]},
    {q:"He eats eggs.", ja:"彼は卵を食べます。", a:"彼は卵を食べます。", c:["彼は卵を食べます。","彼は卵を読みます。","彼は卵を走ります。"]},
    {q:"The fish is big.", ja:"その魚は大きいです。", a:"その魚は大きいです。", c:["その魚は大きいです。","その魚は歌います。","その魚は先生です。"]},
    {q:"I cook dinner.", ja:"私は夕食を作ります。", a:"私は夕食を作ります。", c:["私は夕食を作ります。","私は夕食を走ります。","私は夕食を読みます。"]}
  ],
  [
    {q:"What is this?", ja:"これは何ですか。", a:"これは何ですか。", c:["これは何ですか。","これは誰ですか。","これはどこですか。"]},
    {q:"Where is my bag?", ja:"私のバッグはどこですか。", a:"私のバッグはどこですか。", c:["私のバッグはどこですか。","私のバッグは何ですか。","私のバッグは誰ですか。"]},
    {q:"Who is he?", ja:"彼は誰ですか。", a:"彼は誰ですか。", c:["彼は誰ですか。","彼はどこですか。","彼は何ですか。"]},
    {q:"When is your birthday?", ja:"あなたの誕生日はいつですか。", a:"あなたの誕生日はいつですか。", c:["あなたの誕生日はいつですか。","あなたの名前は何ですか。","あなたはどこですか。"]},
    {q:"How are you?", ja:"元気ですか。", a:"元気ですか。", c:["元気ですか。","何歳ですか。","どこですか。"]},
    {q:"Can you swim?", ja:"あなたは泳げますか。", a:"あなたは泳げますか。", c:["あなたは泳げますか。","あなたは魚ですか。","あなたは水ですか。"]},
    {q:"I can play soccer.", ja:"私はサッカーができます。", a:"私はサッカーができます。", c:["私はサッカーができます。","私はサッカーを食べます。","私はサッカーです。"]},
    {q:"Let's go to school.", ja:"学校へ行きましょう。", a:"学校へ行きましょう。", c:["学校へ行きましょう。","学校を食べましょう。","学校を寝ましょう。"]},
    {q:"Open the door.", ja:"ドアを開けて。", a:"ドアを開けて。", c:["ドアを開けて。","ドアを食べて。","ドアを読んで。"]},
    {q:"Please sit down.", ja:"座ってください。", a:"座ってください。", c:["座ってください。","走ってください。","歌ってください。"]}
  ]
];

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function currentQuestion(){
  return stages[stage][order[stage][qpos]];
}

function startGame(random){
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }catch(e){
    audioCtx = null;
  }

  sound("start");

  order = stages.map(s => [...Array(s.length).keys()]);
  if(random) order.forEach(o => shuffle(o));

  stage = 0;
  qpos = 0;
  correctCount = 0;
  answered = false;

  const startScreen = document.getElementById("startScreen");
  const gameScreen = document.getElementById("gameScreen");
  const clearBox = document.getElementById("clearBox");

  if(startScreen) startScreen.classList.add("hidden");
  if(gameScreen) gameScreen.classList.remove("hidden");
  if(clearBox) clearBox.classList.add("hidden");

  render();
}

function render(){
  const m = monsters[stage];
  const item = currentQuestion();

  document.getElementById("stageName").textContent = m.stage;
  document.getElementById("monsterName").textContent = m.name;
  document.getElementById("monsterImage").src = m.image;

  document.getElementById("questionText").textContent = item.q;
  document.getElementById("hintText").textContent = "ヒント：" + item.ja;

  const hp = Math.max(0, 100 - qpos * 10);
  document.getElementById("hpFill").style.width = hp + "%";

  document.getElementById("countText").textContent = (qpos + 1) + " / 10";
  document.getElementById("scoreText").textContent = "正解 " + correctCount;
  document.getElementById("message").textContent = "";

  const choicesBox = document.getElementById("choices");
  choicesBox.innerHTML = "";

  const shuffledChoices = shuffle([...item.c]);

  shuffledChoices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = choice;
    btn.onclick = () => answer(btn, choice);
    choicesBox.appendChild(btn);
  });

  speak(item.q);
}

function answer(btn, choice){
  if(answered) return;
  answered = true;

  const item = currentQuestion();
  const buttons = document.querySelectorAll(".choice");

  buttons.forEach(b => b.disabled = true);

  if(choice === item.a){
    btn.classList.add("correct");
    correctCount++;
    qpos++;
    document.getElementById("message").textContent = "正解！";
    damageMonster();
    sound("correct");
  }else{
    btn.classList.add("wrong");
    document.getElementById("message").textContent = "ざんねん！正解は「" + item.a + "」";
    sound("wrong");
  }

  setTimeout(() => {
    if(qpos >= 10){
      showStageClear();
    }else{
      answered = false;
      render();
    }
  }, 900);
}

function damageMonster(){
  const img = document.getElementById("monsterImage");
  img.classList.add("damage");
  setTimeout(() => img.classList.remove("damage"), 260);
}

function showStageClear(){
  document.getElementById("clearMessage").textContent = monsters[stage].name + " をたおした！";
  document.getElementById("clearBox").classList.remove("hidden");
  sound("clear");
}

function nextStage(){
  document.getElementById("clearBox").classList.add("hidden");

  stage++;

  if(stage >= stages.length){
    showEnding();
    return;
  }

  qpos = 0;
  answered = false;
  render();
}

function showEnding(){
  const gameScreen = document.getElementById("gameScreen");
  const clearBox = document.getElementById("clearBox");

  if(gameScreen) gameScreen.classList.add("hidden");

  clearBox.classList.remove("hidden");
  clearBox.innerHTML = `
    <div class="clearText">🏆 全クリア！ 🏆</div>
    <p>英検5級モンスターを全部たおした！</p>
    <button onclick="location.reload()">もう一回</button>
  `;

  sound("clear");
}

function speakCurrent(){
  const item = currentQuestion();
  speak(item.q);
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.82;
  u.pitch = 1.05;

  speechSynthesis.speak(u);
}

function tone(freq,duration,type="sine",vol=0.06){
  if(!audioCtx) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sound(type){
  if(type === "start"){
    tone(440,.08,"square",.05);
    setTimeout(()=>tone(660,.08,"square",.05),90);
    setTimeout(()=>tone(880,.12,"square",.05),180);
  }

  if(type === "correct"){
    tone(700,.08,"triangle",.05);
    setTimeout(()=>tone(950,.08,"triangle",.05),90);
  }

  if(type === "wrong"){
    tone(180,.14,"sawtooth",.04);
  }

  if(type === "clear"){

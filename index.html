<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検5級モンスターバトル Ver.3</title>
<style>
:root{--monster:#6ee77c}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(135deg,#fff4c7,#d9f7ff);min-height:100vh;padding:8px;display:flex;justify-content:center;color:#333}
.game{width:min(430px,100%);background:#fff;border-radius:24px;box-shadow:0 8px 25px rgba(0,0,0,.18);padding:12px}
h1{font-size:21px;margin:0;color:#ff4d8d;text-align:center}
.stage{background:linear-gradient(90deg,#8de77c,#6bd5ff);border-radius:16px;padding:7px;font-weight:900;text-align:center;margin:7px 0;font-size:14px}
.monsterArea{text-align:center;background:#f7fbff;border:3px dashed #b9e4ff;border-radius:20px;padding:7px}
.monsterName{font-size:16px;font-weight:900;margin-bottom:2px}
.monster{width:130px;height:105px;margin:0 auto 5px;position:relative;filter:drop-shadow(0 6px 0 rgba(0,0,0,.08));transition:.2s}
.body{position:absolute;left:13px;top:22px;width:104px;height:78px;border-radius:50% 50% 42% 42%;background:var(--monster);border:4px solid rgba(0,0,0,.12)}
.eye{position:absolute;top:42px;width:22px;height:27px;background:#fff;border-radius:50%;border:3px solid #222;z-index:3}
.eye.left{left:38px}.eye.right{right:38px}
.pupil{position:absolute;left:6px;top:8px;width:8px;height:9px;background:#222;border-radius:50%}
.mouth{position:absolute;left:52px;top:76px;width:27px;height:12px;border-bottom:5px solid #222;border-radius:0 0 20px 20px;z-index:3;transition:.12s}
.mouth.open{height:24px;border:5px solid #222;border-top:0;background:#ff7aa2}
.cheek{position:absolute;top:72px;width:17px;height:9px;background:rgba(255,115,150,.5);border-radius:50%;z-index:3}
.cheek.l{left:27px}.cheek.r{right:27px}
.antenna{position:absolute;width:14px;height:38px;background:var(--monster);border-radius:20px;top:0;border:3px solid rgba(0,0,0,.10)}
.antenna.a{left:34px;transform:rotate(-22deg)}.antenna.b{right:34px;transform:rotate(22deg)}
.accessory{position:absolute;z-index:4;font-size:28px;left:50%;top:0;transform:translateX(-50%)}
.shake{animation:shake .42s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px) rotate(-4deg)}50%{transform:translateX(12px) rotate(4deg)}75%{transform:translateX(-7px) rotate(-2deg)}}
.angry{animation:angry .5s}
@keyframes angry{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.hpbar{height:17px;background:#e7eef5;border-radius:999px;overflow:hidden;border:2px solid #d2dde8}
.hpfill{height:100%;width:100%;background:linear-gradient(90deg,#36d16f,#ffd447,#ff5a7c);transition:.35s}
.progress{text-align:center;font-weight:900;margin:6px;color:#555;font-size:14px}
.questionBox{background:#fff9e8;border:3px solid #ffd66b;border-radius:18px;padding:9px;margin:7px 0;text-align:center}
.question{font-size:25px;font-weight:900;color:#263238;cursor:pointer}
.kana{font-size:15px;font-weight:900;color:#ff4d8d;margin-top:3px}
.hint{font-size:12px;background:#fff1b5;border-radius:12px;padding:5px;margin-top:5px;font-weight:700}
.choices{display:grid;gap:7px}
.choice{border:0;border-radius:15px;padding:11px;font-size:16px;font-weight:900;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.18)}
.choice:nth-child(1){background:#ff6b8f}.choice:nth-child(2){background:#42a5f5}.choice:nth-child(3){background:#37c978}
.choice:disabled{opacity:.65}
.message{text-align:center;font-size:15px;font-weight:900;margin:7px 0;padding:7px;border-radius:15px;background:#f4f7ff;min-height:38px}
.ok{color:#20b86f}.bad{color:#ff4d6d}
.nextBtn,.restartBtn{width:100%;border:0;border-radius:15px;padding:10px;font-size:16px;font-weight:900;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.18);margin-top:6px}
.nextBtn{background:#8e5cff;display:none}.restartBtn{background:#00bcd4}
.clear{font-size:21px;text-align:center;font-weight:900;color:#ff4d8d;background:#fff2fb;border-radius:18px;padding:12px;margin-top:8px;display:none}
.tapStart{position:fixed;inset:0;background:rgba(255,255,255,.97);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.tapStart button{border:0;border-radius:20px;background:#ff5f9c;color:white;font-size:21px;font-weight:900;padding:14px 20px;margin:8px;box-shadow:0 6px 0 rgba(0,0,0,.18)}
.soundNote{text-align:center;font-size:11px;color:#666;margin-top:5px}
  .startTitle{
  font-size:32px;
  line-height:1.05;
  color:#ff4d8d;
  text-shadow:3px 3px 0 #fff,5px 5px 0 rgba(0,0,0,.08);
  margin-bottom:10px;
}

.monsterParty{
  background:rgba(255,255,255,.72);
  border:3px dashed #ffb3cf;
  border-radius:26px;
  padding:12px 8px;
  margin:8px 0 12px;
  box-shadow:0 8px 0 rgba(0,0,0,.06);
}

.partySpeech{
  display:inline-block;
  background:#fff;
  color:#1e88e5;
  font-weight:900;
  border-radius:999px;
  padding:7px 14px;
  margin-bottom:8px;
  box-shadow:0 4px 0 rgba(0,0,0,.08);
}

.partyRow{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
}

.partyMonster{
  display:flex;
  align-items:center;
  justify-content:center;
  width:54px;
  height:54px;
  border-radius:50%;
  font-size:28px;
  border:3px solid rgba(0,0,0,.12);
  box-shadow:0 6px 0 rgba(0,0,0,.10);
  animation:partyBounce 1.6s infinite ease-in-out;
}

.partyMonster.green{background:#6ee77c}
.partyMonster.blue{background:#65c7ff;animation-delay:.1s}
.partyMonster.orange{background:#ffae42;animation-delay:.2s}
.partyMonster.yellow{background:#ffd447;animation-delay:.3s}
.partyMonster.purple{background:#b879ff;animation-delay:.4s}

.startText{
  font-weight:900;
  margin:8px 0;
}

.startText.small{
  font-size:13px;
}

@keyframes partyBounce{
  0%,100%{transform:translateY(0) rotate(0)}
  50%{transform:translateY(-8px) rotate(4deg)}
}
  /* スタート画面 */
.tapStart{position:fixed;inset:0;background:radial-gradient(circle at center,#fff9d8,#ffe7f1 55%,#d9f7ff);z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px;overflow:hidden}
.startTitle{font-size:30px;font-weight:1000;line-height:1.05;color:#ff4d8d;text-shadow:3px 3px 0 #fff,5px 5px 0 rgba(0,0,0,.08);margin-bottom:8px}
.startTitle span{display:block;font-size:19px;color:#32aa45}
.party{position:relative;width:330px;height:300px;margin:2px auto 8px}
.mini{position:absolute;width:96px;height:82px;border-radius:50%;background:var(--c);border:4px solid rgba(0,0,0,.12);box-shadow:0 8px 0 rgba(0,0,0,.08);animation:bounce 1.8s infinite ease-in-out}
.mini::before,.mini::after{content:"";position:absolute;top:25px;width:19px;height:24px;background:#fff;border:3px solid #222;border-radius:50%}
.mini::before{left:24px}.mini::after{right:24px}
.minimouth{position:absolute;left:38px;top:55px;width:23px;height:13px;background:#6b2b25;border-radius:0 0 20px 20px}
.hand{position:absolute;width:28px;height:28px;background:#fff;border-radius:50%;border:3px solid rgba(0,0,0,.12)}
.m1{left:118px;top:0;--c:#b879ff;animation-delay:.1s}
.m2{left:20px;top:80px;--c:#6ee77c;animation-delay:.2s}
.m3{right:20px;top:80px;--c:#65c7ff;animation-delay:.3s}
.m4{left:45px;bottom:15px;--c:#ffae42;animation-delay:.4s}
.m5{right:45px;bottom:15px;--c:#ffd447;animation-delay:.5s}
.m1 .hand{left:78px;top:53px}.m2 .hand{right:-12px;top:45px}.m3 .hand{left:-12px;top:45px}.m4 .hand{right:-12px;top:30px}.m5 .hand{left:-12px;top:30px}
.crown{position:absolute;top:-22px;left:33px;font-size:28px}
.glasses{position:absolute;top:24px;left:17px;font-size:60px}
.speech{position:absolute;background:#fff;border-radius:999px;padding:6px 12px;font-weight:900;color:#1d74d8;box-shadow:0 4px 0 rgba(0,0,0,.08);animation:pop 2s infinite}
.s1{left:4px;top:20px;color:#30a83f}.s2{right:0;top:20px}.s3{left:0;bottom:45px;color:#f06b20}.s4{right:0;bottom:45px;color:#ff4d8d}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-8px) rotate(3deg)}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.startBtns{display:grid;gap:9px;width:min(300px,90%)}
.startBtns button{border:0;border-radius:22px;color:white;font-size:20px;font-weight:1000;padding:14px 16px;box-shadow:0 6px 0 rgba(0,0,0,.18)}
.startBtns button:first-child{background:linear-gradient(90deg,#ff5f9c,#ff9f43)}
.startBtns button:last-child{background:linear-gradient(90deg,#248cff,#23c36b)}
.bgm{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.35);color:#fff;border-radius:999px;padding:7px 10px;font-weight:900}
.tapHint{font-size:13px;font-weight:900;background:#fff;border-radius:16px;padding:7px 10px;margin-top:8px}
  .monsterImage{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  z-index:5;
}
.monster .body,
.monster .eye,
.monster .mouth,
.monster .cheek,
.monster .antenna,
.monster .accessory{
  display:none;
}
  .mini{
  background:transparent !important;
  border:0 !important;
  box-shadow:none !important;
}

.mini::before,
.mini::after{
  display:none !important;
}

.mini img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.minimouth,
.hand,
.crown,
.glasses{
  display:none !important;
}
  .party .mini{
  overflow:hidden !important;
}

.party .mini img{
  width:118% !important;
  height:118% !important;
  object-fit:contain !important;
  margin-left:-9% !important;
  margin-top:-9% !important;
}
</style>
</head>
<body>

<div class="tapStart" id="tapStart">
  <div class="startTitle">
    <span>英検5級</span>
    モンスターバトル
  </div>

  <div class="party">
    <div class="speech s1">Hello!</div>
    <div class="speech s2">Good morning!</div>
    <div class="speech s3">I'm fine!</div>
    <div class="speech s4">I like apples!</div>

    <div class="mini m1"><img src="img/purple_monster.png" alt="purple monster"></div>
　　　<div class="mini m2"><img src="img/green_monster.png" alt="green monster"></div>
　　　<div class="mini m3"><img src="img/blue_monster.png" alt="blue monster"></div>
　　　<div class="mini m4"><img src="img/orange_monster.png" alt="orange monster"></div>
　　　<div class="mini m5"><img src="img/yellow_monster.png" alt="yellow monster"></div>
  </div>

  <div class="startBtns">
    <button onclick="startGame(false)">⭐ 順番どおり</button>
<button onclick="startGame(true)">🎲 ステージ内ランダム</button>
  </div>

  <div class="tapHint">英文をタップすると、もう一度しゃべるよ♪</div>
  <div class="bgm">♪ BGM ON</div>
</div>

<div class="game">
  <h1>英検5級モンスターバトル</h1>
  <div class="stage" id="stageName"></div>

  <div class="monsterArea">
    <div class="monsterName" id="monsterName"></div>
    <div class="monster" id="monster">
      <img id="monsterImage" class="monsterImage" src="" alt="monster">
      <div class="accessory" id="accessory"></div>
      <div class="antenna a"></div><div class="antenna b"></div>
      <div class="body"></div>
      <div class="eye left"><div class="pupil"></div></div>
      <div class="eye right"><div class="pupil"></div></div>
      <div class="mouth" id="mouth"></div>
      <div class="cheek l"></div><div class="cheek r"></div>
    </div>
    <div><b>MONSTER HP</b></div>
    <div class="hpbar"><div class="hpfill" id="hpfill"></div></div>
  </div>

  <div class="progress" id="progress"></div>

  <div class="questionBox">
    <div class="question" id="question" onclick="tapSpeak()"></div>
    <div class="kana" id="kana"></div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="message" id="message">答えを選んで攻撃！</div>
  <button class="nextBtn" id="nextBtn" onclick="nextQuestion()">次の問題へ ▶</button>
  <button class="restartBtn" onclick="restart()">最初から 🔁</button>
  <div class="clear" id="clearBox">🏆 GAME CLEAR!<br>英検5級モンスターを全部たおした！</div>
  <div class="soundNote">※iPhoneではマナーモード中、音が小さい場合があります。</div>
</div>

<script>
const monsters=[
 {name:'Greeting Monster',stage:'🌱 Stage1 あいさつの森',color:'#6ee77c',acc:'🌱',image:'img/green_monster.png'},
 {name:'Family Monster',stage:'🏠 Stage2 家族の洞窟',color:'#65c7ff',acc:'👓',image:'img/blue_monster.png'},
 {name:'Number Monster',stage:'🔢 Stage3 数字火山',color:'#ffae42',acc:'🔢',image:'img/orange_monster.png'},
 {name:'Food Monster',stage:'🍎 Stage4 食べ物の城',color:'#ffd447',acc:'🍳',image:'img/yellow_monster.png'},
 {name:'King Eiken',stage:'👑 Stage5 英検5級魔王城',color:'#b879ff',acc:'👑',image:'img/purple_monster.png'}
];

const stages=[
[
{en:'Hello.',kana:'ハロー',jp:'こんにちは',choices:['こんにちは','さようなら','おやすみ'],hint:'会ったときのあいさつ'},
{en:'Good morning.',kana:'グッド モーニング',jp:'おはよう',choices:['こんばんは','おはよう','ありがとう'],hint:'朝のあいさつ'},
{en:'Good night.',kana:'グッド ナイト',jp:'おやすみ',choices:['こんにちは','おやすみ','またね'],hint:'寝る前の言葉'},
{en:'Thank you.',kana:'サンキュー',jp:'ありがとう',choices:['ありがとう','ごめんなさい','どういたしまして'],hint:'感謝する言葉'},
{en:"You're welcome.",kana:'ユア ウェルカム',jp:'どういたしまして',choices:['どういたしまして','ありがとう','こんにちは'],hint:'Thank you.への返事'},
{en:'See you.',kana:'シー ユー',jp:'またね',choices:['またね','おはよう','こんばんは'],hint:'別れるとき'},
{en:'Goodbye.',kana:'グッドバイ',jp:'さようなら',choices:['さようなら','ありがとう','こんにちは'],hint:'別れのあいさつ'},
{en:'How are you?',kana:'ハウ アー ユー',jp:'元気ですか？',choices:['元気ですか？','何歳ですか？','どこですか？'],hint:'調子を聞く'},
{en:"I'm fine.",kana:'アイム ファイン',jp:'元気です',choices:['眠いです','元気です','疲れました'],hint:'返事'},
{en:'Nice to meet you.',kana:'ナイス トゥ ミート ユー',jp:'はじめまして',choices:['はじめまして','ありがとう','おやすみ'],hint:'初対面'}
],
[
{en:'father',kana:'ファーザー',jp:'父',choices:['父','母','兄'],hint:'お父さん'},
{en:'mother',kana:'マザー',jp:'母',choices:['兄','母','姉'],hint:'お母さん'},
{en:'brother',kana:'ブラザー',jp:'兄・弟',choices:['兄・弟','姉・妹','父'],hint:'男のきょうだい'},
{en:'sister',kana:'シスター',jp:'姉・妹',choices:['兄','母','姉・妹'],hint:'女のきょうだい'},
{en:'family',kana:'ファミリー',jp:'家族',choices:['学校','家族','先生'],hint:'家の人たち'},
{en:'grandfather',kana:'グランドファーザー',jp:'祖父',choices:['祖父','祖母','父'],hint:'おじいちゃん'},
{en:'grandmother',kana:'グランドマザー',jp:'祖母',choices:['祖母','母','姉'],hint:'おばあちゃん'},
{en:'uncle',kana:'アンクル',jp:'おじ',choices:['おじ','おば','兄'],hint:'父母の兄弟など'},
{en:'aunt',kana:'アント',jp:'おば',choices:['おば','おじ','母'],hint:'父母の姉妹など'},
{en:'This is my family.',kana:'ディス イズ マイ ファミリー',jp:'これは私の家族です',choices:['これは私の学校です','これは私の家族です','これは私の先生です'],hint:'This is は「これは」'}
],
[
{en:'one',kana:'ワン',jp:'1',choices:['1','2','3'],hint:'数字'},
{en:'two',kana:'トゥー',jp:'2',choices:['1','2','5'],hint:'数字'},
{en:'three',kana:'スリー',jp:'3',choices:['2','3','4'],hint:'数字'},
{en:'four',kana:'フォー',jp:'4',choices:['4','5','6'],hint:'数字'},
{en:'five',kana:'ファイブ',jp:'5',choices:['5','7','8'],hint:'数字'},
{en:'six',kana:'シックス',jp:'6',choices:['6','9','10'],hint:'数字'},
{en:'seven',kana:'セブン',jp:'7',choices:['7','8','9'],hint:'数字'},
{en:'eight',kana:'エイト',jp:'8',choices:['8','10','12'],hint:'数字'},
{en:'nine',kana:'ナイン',jp:'9',choices:['7','8','9'],hint:'数字'},
{en:'ten',kana:'テン',jp:'10',choices:['10','11','12'],hint:'数字'}
],
[
{en:'apple',kana:'アポー',jp:'りんご',choices:['りんご','みかん','ぶどう'],hint:'赤い果物'},
{en:'banana',kana:'バナーナ',jp:'バナナ',choices:['りんご','バナナ','いちご'],hint:'黄色い果物'},
{en:'bread',kana:'ブレッド',jp:'パン',choices:['牛乳','パン','ごはん'],hint:'朝ごはんにも出る'},
{en:'rice',kana:'ライス',jp:'ごはん',choices:['ごはん','パン','肉'],hint:'日本の主食'},
{en:'water',kana:'ウォーター',jp:'水',choices:['水','牛乳','お茶'],hint:'飲み物'},
{en:'milk',kana:'ミルク',jp:'牛乳',choices:['ジュース','牛乳','水'],hint:'白い飲み物'},
{en:'egg',kana:'エッグ',jp:'卵',choices:['卵','肉','魚'],hint:'にわとりから'},
{en:'fish',kana:'フィッシュ',jp:'魚',choices:['魚','鳥','犬'],hint:'海や川にいる'},
{en:'meat',kana:'ミート',jp:'肉',choices:['肉','魚','卵'],hint:'ステーキなど'},
{en:'I like apples.',kana:'アイ ライク アポーズ',jp:'私はりんごが好きです',choices:['私は犬が好きです','私はりんごが好きです','私は魚が好きです'],hint:'I like は「私は好き」'}
],
[

let order=[],stage=0,qpos=0,answered=false,audioCtx=null,tapCount=0,lastTap=0;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function startGame(random){
 audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 sound('start');

 order=stages.map(s=>[...Array(s.length).keys()]);
 if(random) order.forEach(o=>shuffle(o));

 stage=0;
 qpos=0;
 answered=false;

 document.getElementById('tapStart').style.display='none';

 render();
}

function q(){return stages[stage][order[stage][qpos]]}

function beep(freq,dur,type='sine',gain=.08){
 if(!audioCtx)return;
 const o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.type=type;o.frequency.value=freq;g.gain.value=gain;
 o.connect(g);g.connect(audioCtx.destination);o.start();
 g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
 o.stop(audioCtx.currentTime+dur);
}
function sound(name){
 if(name==='start'){[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.12),i*90))}
 if(name==='correct'){beep(660,.1);setTimeout(()=>beep(880,.13),90)}
 if(name==='wrong'){beep(180,.22,'sawtooth',.06)}
 if(name==='stage'){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*140))}
 if(name==='clear'){[523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,.22),i*170))}
}

function render(){
 answered=false;tapCount=0;
 const m=monsters[stage],qq=q();
  document.getElementById("monsterImage").src = m.image;
 document.documentElement.style.setProperty('--monster',m.color);
 document.getElementById('stageName').textContent=m.stage;
 document.getElementById('monsterName').textContent=m.name;
 document.getElementById('accessory').textContent=m.acc;
 document.getElementById('hpfill').style.width=((10-qpos)*10)+'%';
 document.getElementById('progress').textContent='Stage '+(stage+1)+' / 5　Question '+(qpos+1)+' / 10';
 document.getElementById('question').textContent=qq.en;
 document.getElementById('kana').textContent=qq.kana;
 document.getElementById('hint').textContent='ヒント：'+qq.hint;
 document.getElementById('message').textContent='答えを選んで攻撃！';
 document.getElementById('message').className='message';
 document.getElementById('nextBtn').style.display='none';
 document.getElementById('mouth').classList.remove('open');
 const choices=document.getElementById('choices');choices.innerHTML='';
 qq.choices.forEach(c=>{
  const b=document.createElement('button');b.className='choice';b.textContent=c;b.onclick=()=>answer(c);choices.appendChild(b);
 });
 setTimeout(()=>speak(false),500);
}

function mouthOpen(on){document.getElementById('mouth').classList.toggle('open',on)}

function speak(byTap){
 const qq=q();
 if(byTap){
  const now=Date.now();
  if(now-lastTap<1600){tapCount++}else{tapCount=1}
  lastTap=now;
  if(tapCount>=4){
   document.getElementById('message').innerHTML='😣 モンスター「もう読んだよ〜！」';
   const mon=document.getElementById('monster');mon.classList.add('angry');
   setTimeout(()=>mon.classList.remove('angry'),500);
  }
 }
 const u=new SpeechSynthesisUtterance(qq.en);
 u.lang='en-US';u.rate=.85;
 u.onstart=()=>mouthOpen(true);
 u.onend=()=>mouthOpen(false);
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}
function tapSpeak(){speak(true)}

function answer(choice){
 if(answered)return;
 answered=true;
 speechSynthesis.cancel();mouthOpen(false);
 document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
 const qq=q(),msg=document.getElementById('message');
 if(choice===qq.jp){
  sound('correct');
  msg.innerHTML='✨ 正解！<br>⚔️ アタック！！';
  msg.className='message ok';
  attack();
 }else{
  sound('wrong');
  msg.innerHTML='❌ おしい！<br>正解は「'+qq.jp+'」';
  msg.className='message bad';
  document.getElementById('nextBtn').style.display='block';
 }
}

function attack(){
 const mon=document.getElementById('monster');
 mon.classList.add('shake');
 setTimeout(()=>{document.getElementById('hpfill').style.width=Math.max(0,(9-qpos)*10)+'%'},220);
 setTimeout(()=>{
  mon.classList.remove('shake');
  if(qpos===9){
   if(stage===4){clearGame()}
   else{
    sound('stage');
    document.getElementById('message').innerHTML='🎉 ステージクリア！<br>次のモンスターへ！';
    document.getElementById('nextBtn').textContent='次のステージへ ▶';
    document.getElementById('nextBtn').style.display='block';
   }
  }else{
   document.getElementById('nextBtn').textContent='次の問題へ ▶';
   document.getElementById('nextBtn').style.display='block';
  }
 },650);
}

function nextQuestion(){
 if(qpos===9){stage++;qpos=0}else{qpos++}
 if(stage>=5){clearGame();return}
 document.getElementById('nextBtn').textContent='次の問題へ ▶';
 render();
}

function clearGame(){
 sound('clear');
 document.getElementById('clearBox').style.display='block';
 document.getElementById('nextBtn').style.display='none';
 document.getElementById('message').innerHTML='🏆 全ステージクリア！すごい！';
 document.getElementById('hpfill').style.width='0%';
}

function restart(){
 speechSynthesis.cancel();
 stage=0;qpos=0;tapCount=0;lastTap=0;
 document.getElementById('clearBox').style.display='none';
 document.getElementById('tapStart').style.display='flex';
}
</script>
</body>
</html>
